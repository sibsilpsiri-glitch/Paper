<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รางวัลสำหรับคนเก่ง ssucommu</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root {
            --bg-color: #2c2c2c;
            --paper-color: #f4f1ea;
            --text-color: #333;
            --shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        body {
            background-color: var(--bg-color);
            margin: 0;
            padding: 20px;
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* โครงสร้างกระดาษแผ่นใหญ่ */
        .poster-container {
            width: 100%;
            max-width: 400px; /* ขนาดพอดีมือถือ */
            background-color: var(--paper-color);
            box-shadow: var(--shadow);
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 2px;
            /* สร้าง Texture กระดาษสมจริง */
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
        }

        .poster-header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px dashed #ccc;
        }

        .poster-header h1 {
            font-size: 28px;
            font-weight: 600;
            color: var(--text-color);
            margin: 0 0 10px 0;
            letter-spacing: 1px;
        }

        .poster-header p {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }

        /* พื้นที่สำหรับกระดาษฉีก 100 ใบ (แบ่งเป็น Grid เพื่อให้ดูสวยบนมือถือ) */
        .tabs-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 คอลัมน์ */
            gap: 0px;
            padding-bottom: 20px;
        }

        /* ดีไซน์ของกระดาษแต่ละใบ */
        .tear-tab {
            background-color: var(--paper-color);
            border-right: 1px dashed #bbb;
            border-bottom: 1px dashed #bbb;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transform-origin: top center;
            transition: background-color 0.2s, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
        }

        .tear-tab:nth-child(5n) {
            border-right: none;
        }

        .tear-tab:hover {
            background-color: #fffaf0;
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        /* แอนิเมชันตอนถูกฉีก (ร่วงลงและหายไป) */
        .tear-tab.torn {
            animation: tearOff 0.8s forwards;
            pointer-events: none;
        }

        @keyframes tearOff {
            0% { transform: rotate(0deg) translateY(0); opacity: 1; }
            20% { transform: rotate(-5deg) translateY(10px); }
            100% { transform: rotate(15deg) translateY(200px); opacity: 0; }
        }

        /* สถานะที่ถูกฉีกไปแล้ว (แหว่ง) */
        .tear-tab.empty {
            visibility: hidden;
            pointer-events: none;
        }

        .tab-number {
            font-size: 18px;
            color: #888;
            font-weight: 300;
        }

        /* ปรับแต่ง SweetAlert ให้เหมือนอ่านจดหมาย */
        .swal2-popup.paper-popup {
            background-color: #fdfbf7;
            background-image: url('https://www.transparenttextures.com/patterns/cream-paper.png');
            color: #333;
            font-family: 'Prompt', sans-serif;
            border-radius: 0;
            box-shadow: 5px 5px 20px rgba(0,0,0,0.3);
            text-align: left;
        }
    </style>
</head>
<body>

    <div class="poster-container">
        <div class="poster-header">
            <h1>รางวัลสำหรับคนเก่ง ssucommu</h1>
            <p>คุณทำงานหนักมามากแล้ว ลองดึงกระดาษด้านล่างนี้สักใบสิ<br>ข้อความที่ซ่อนอยู่เป็นรางวัลสำหรับความตั้งใจของคุณนะ</p>
        </div>
        <div class="tabs-container" id="tabsContainer">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAZgPAxI98P3ziUC_ImVYjXsDyqqhi6zCE",
  authDomain: "paperssu.firebaseapp.com",
  databaseURL: "https://paperssu-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "paperssu",
  storageBucket: "paperssu.firebasestorage.app",
  messagingSenderId: "631768847246",
  appId: "1:631768847246:web:5acae5b7cdce3433958adf",
  measurementId: "G-E3B0E1NRSG"
};

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // ข้อความให้กำลังใจ 100 ข้อความ (ขนาดยาวและไม่ซ้ำ)
        const messages = [
            "1. แม้เส้นทางในวันนี้จะดูยาวไกลและเต็มไปด้วยความเหนื่อยล้า แต่ขอให้จำไว้ว่าทุกก้าวที่คุณเดินกำลังสร้างรากฐานที่แข็งแกร่งให้กับอนาคต คุณเก่งมากที่ผ่านเรื่องราวยากๆ มาได้จนถึงตอนนี้ พักผ่อนให้เต็มอิ่ม แล้วพรุ่งนี้ค่อยเริ่มต้นใหม่ด้วยใจที่พร้อมกว่าเดิมนะ",
            "2. ความพยายามที่คุณทุ่มเทลงไปในทุกๆ วันไม่เคยสูญเปล่า มันอาจจะยังไม่ผลิดอกออกผลให้เห็นในทันที แต่มันกำลังหยั่งรากลึกเพื่อให้คุณเติบโตอย่างมั่นคงในวันข้างหน้า ภูมิใจในตัวเองให้มากๆ นะ เพราะคุณคือคนเก่งที่ยอดเยี่ยมที่สุด",
            "3. รอยยิ้มของคุณคือสิ่งที่มีค่ามากที่สุด อย่าปล่อยให้ความเครียดหรือความกังวลมาขโมยมันไป อนุญาตให้ตัวเองได้พักหายใจบ้าง การพักผ่อนไม่ใช่ความพ่ายแพ้ แต่เป็นการเติมพลังเพื่อวาดฝันในวันต่อไปให้สวยงามยิ่งขึ้น",
            "4. บางครั้งผลงานที่เราตั้งใจทำอาจจะไม่สมบูรณ์แบบในสายตาคนอื่น แต่มันคือศิลปะชิ้นเอกที่เกิดจากหยาดเหงื่อและจิตวิญญาณของเรา จงเชื่อมั่นในเอกลักษณ์และเส้นทางที่คุณเลือกเดิน ไม่มีใครทำแบบคุณได้ และนั่นแหละคือความพิเศษของคุณ",
            "5. ท้องฟ้าไม่เคยมืดมิดตลอดกาล ต่อให้คืนนี้จะพายุโหมกระหน่ำแค่ไหน พรุ่งนี้เช้าแสงอาทิตย์ก็จะสาดส่องลงมาเสมอ ขอให้คุณมีความหวังในหัวใจ และรู้ไว้ว่าคุณมีความเข้มแข็งพอที่จะผ่านพ้นทุกพายุรุนแรงในชีวิตไปได้อย่างสง่างาม",
            "6. คุณเปรียบเสมือนสถาปนิกที่กำลังออกแบบชีวิตของตัวเอง บางวันอาจจะต้องรื้อแบบร่างทิ้ง บางวันอาจจะก่ออิฐผิดพลาด แต่นั่นคือขั้นตอนของการสร้างผลงานที่ยิ่งใหญ่ จงอดทนกับกระบวนการ และชื่นชมทุกความก้าวหน้าของตัวเองนะ",
            "7. การเป็นผู้ใหญ่คือการเรียนรู้ที่จะโอบกอดความไม่สมบูรณ์แบบของตัวเองและคนรอบข้าง วันไหนที่รู้สึกว่าตัวเองทำพลาด อย่าเพิ่งดุด่าตัวเองแรงนักเลย ลูบหัวตัวเองเบาๆ แล้วบอกว่า 'ไม่เป็นไรนะ เราทำดีที่สุดแล้วจริงๆ'",
            "8. มิตรภาพและความรักรอบตัวคุณคือเกราะป้องกันชั้นดีที่ช่วยให้คุณยืนหยัดได้ในวันที่โลกใจร้าย อย่าลืมหันไปรับพลังงานดีๆ จากคนที่รักคุณ และมอบความรักนั้นกลับให้ตัวเองด้วย คุณสมควรได้รับสิ่งที่ดีที่สุดเสมอ",
            "9. การเดินทางไกลไม่ได้วัดกันที่ความเร็ว แต่วัดกันที่ความสม่ำเสมอและหัวใจที่ไม่ยอมแพ้ แม้คุณจะเดินช้ากว่าใครๆ แต่ถ้าคุณไม่หยุดเดิน คุณก็เข้าใกล้เป้าหมายมากขึ้นทุกวินาที จงมั่นคงในจังหวะก้าวของตัวเองนะ",
            "10. ขอให้คุณมีหัวใจที่อ่อนโยนต่อโลกใบนี้ แต่ก็แข็งแกร่งพอที่จะปกป้องความฝันของตัวเอง อย่าปล่อยให้คำพูดของคนที่ไม่ได้ร่วมเดินทางมาดับไฟในใจคุณ คุณคือคนกำหนดทิศทางชีวิตตัวเอง และคุณกำลังทำมันได้ดีมากๆ",
            "11. วันนี้คุณดื่มน้ำเพียงพอหรือยัง? กินข้าวตรงเวลาไหม? อย่ามัวแต่ดูแลคนอื่นหรือทุ่มเทให้งานจนลืมดูแลร่างกายที่เป็นบ้านหลังเดียวของจิตวิญญาณคุณนะ ร่างกายนี้แหละที่จะพาคุณไปพบกับความสำเร็จที่รออยู่",
            "12. ความเก่งไม่ได้แปลว่าต้องทำได้ทุกอย่าง หรือห้ามอ่อนแอเลย คนเก่งที่แท้จริงคือคนที่กล้ายอมรับว่าตัวเองเหนื่อย กล้าร้องไห้เพื่อระบายความอัดอั้น และกล้าที่จะขอความช่วยเหลือเมื่อถึงขีดจำกัด อนุญาตให้ตัวเองอ่อนแอบ้างนะ",
            "13. ยังมีหลายคนที่พร้อมรักคุณ",
            "14. ความทรงจำที่ดีในอดีตคือพลังใจ ส่วนบทเรียนที่เจ็บปวดคือแผนที่นำทาง อย่าให้ความกลัวในอดีตมาจำกัดศักยภาพในอนาคต คุณมีสิทธิ์ที่จะเริ่มต้นใหม่ได้ในทุกๆ วันที่ตื่นขึ้นมา ชีวิตคือสมุดหน้ากระดาษเปล่าที่คุณเป็นคนเขียนเอง",
            "15. โลกใบนี้อาจจะหมุนเร็วจนบางครั้งเราก้าวตามไม่ทัน ไม่เป็นไรเลยที่จะหยุดพักแล้วนั่งดูโลกหมุนไปบ้าง การหยุดนิ่งไม่ได้หมายความว่าเราถูกทิ้งไว้ข้างหลัง แต่หมายความว่าเรากำลังให้เวลาตัวเองพิจารณาว่าก้าวต่อไปเราจะไปที่ไหน",
            "16. ฉันขอเป็นกำลังใจเล็กๆ ให้คุณในวันนี้ ไม่ว่าคุณกำลังเผชิญกับบททดสอบอะไรอยู่ ขอให้รู้ไว้ว่าลึกลงไปในตัวคุณมีพลังมหาศาลซ่อนอยู่ พลังที่จะผลักดันให้คุณผ่านจุดที่ยากลำบากที่สุดไปได้ คุณแข็งแกร่งกว่าที่คุณคิดไว้นะ",
            "17. ความสวยงามของชีวิตคือการที่เราได้ค่อยๆ เรียนรู้และเติบโตขึ้นทุกวัน แม้วันนี้คุณจะทำผิดพลาด แต่อย่างน้อยคุณก็ได้เรียนรู้วิธีที่จะไม่ทำพลาดแบบเดิมอีก ความผิดพลาดไม่ใช่ศัตรู แต่เป็นครูที่สอนให้เราเก่งขึ้นต่างหาก",
            "18. จงยินดีกับความสำเร็จเล็กๆ น้อยๆ ในชีวิต ไม่ว่าจะเป็นการตื่นตรงเวลา การกินของอร่อย หรือการเคลียร์งานเสร็จไปหนึ่งชิ้น ความสำเร็จเล็กๆ เหล่านี้คืออิฐก้อนเล็กที่ก่อร่างสร้างความมั่นใจให้คุณกล้าทำสิ่งใหญ่ๆ ในอนาคต",
            "19. หากคุณรู้สึกโดดเดี่ยว ขอให้มองขึ้นไปบนฟ้า ดวงดาวนับล้านดวงก็ยังคงส่องแสงอยู่ตรงนั้นเสมอ เช่นเดียวกับความรักความปรารถนาดีจากคนที่ห่วงใยคุณ แม้บางครั้งอาจจะมองไม่เห็นแต่ก็ไม่ได้แปลว่ามันไม่มีอยู่จริงนะ",
            "20. ขอให้คุณสนุกกับเกมชีวิตที่คุณกำลังเล่นอยู่ ถึงแม้บางด่านจะยากจนแทบถอดใจ แต่ทันทีที่คุณผ่านมันไปได้ คุณจะพบว่ารางวัลที่รออยู่นั้นคุ้มค่ากับความเหนื่อยยากเสมอ อย่าลืมอัปเลเวลความสุขให้ตัวเองในทุกๆ วันด้วยล่ะ",
            "21. งานศิลปะที่ยิ่งใหญ่ต้องใช้เวลาในการสร้างสรรค์ฉันใด ชีวิตที่มีความหมายก็ต้องผ่านการหล่อหลอมด้วยกาลเวลาฉันนั้น อย่าเร่งรีบที่จะสมบูรณ์แบบ ให้เวลาตัวเองได้ตกตะกอนความคิด และเบ่งบานในเวลาที่เหมาะสมที่สุดของตัวคุณเอง",
            "22. น้ำตาที่ไหลออกมาไม่ได้แปลว่าคุณพ่ายแพ้ แต่มันคือการชำระล้างความรู้สึกหนักอึ้งในใจ เพื่อเตรียมพื้นที่ว่างให้ความสุขรอบใหม่ได้เข้ามาเติบโต ร้องไห้ให้พอ แล้วปาดน้ำตาลุกขึ้นยืนใหม่ด้วยแววตาที่มุ่งมั่นกว่าเดิมนะ",
            "23. ในวันที่อะไรๆ ก็ดูไม่เป็นใจ ขอให้คุณลองเปลี่ยนมุมมองจากคำว่า 'ทำไมต้องเป็นเรา' เป็นคำว่า 'เรื่องนี้สอนอะไรเรา' การปรับเปลี่ยนมุมมองเพียงเล็กน้อยจะช่วยปลดล็อกความทุกข์ และทำให้คุณรับมือกับปัญหาได้ด้วยสติและปัญญา",
            "24. คุณค่าของคุณไม่ได้ขึ้นอยู่กับยอดไลก์ คำชมจากใครๆ หรือผลลัพธ์ของงาน แต่คุณมีคุณค่าในตัวเองตั้งแต่เกิดมาเป็นคุณแล้ว จงภูมิใจในความเป็นตัวเอง เพราะบนโลกนี้มีคุณแค่คนเดียวเท่านั้นที่ยอดเยี่ยมในแบบฉบับของคุณเอง",
            "25. บางการตัดสินใจอาจจะนำพาความเสียใจมาให้ แต่นั่นก็ดีกว่าการไม่เคยได้ลองตัดสินใจทำอะไรเลย ทุกเส้นทางที่คุณเลือกเดินล้วนมีดอกไม้ป่าที่สวยงามรอให้คุณค้นพบเสมอ ขอแค่ใจคุณเปิดรับความงดงามระหว่างทางเท่านั้น",
            "26. ความสัมพันธ์ที่ดีคือความสัมพันธ์ที่ทำให้คุณได้เป็นตัวของตัวเองอย่างเต็มที่ เป็นพื้นที่ปลอดภัยที่คุณไม่ต้องฝืนพยายามเป็นคนอื่น ขอให้คุณรักษาสิ่งเหล่านั้นไว้ให้ดี และที่สำคัญอย่าลืมเป็นพื้นที่ปลอดภัยให้กับตัวเองด้วยล่ะ",
            "27. ทุกคืนก่อนนอน ลองถามตัวเองดูว่าวันนี้มีเรื่องอะไรที่ทำให้เรายิ้มได้บ้าง แม้จะเป็นเรื่องเล็กน้อยแค่ไหนก็จงเก็บมันไว้ในลิ้นชักความทรงจำ เพื่อเป็นเสบียงความสุขไว้หล่อเลี้ยงหัวใจในวันที่ความเศร้าเดินทางมาเยือน",
            "28. เสียงในหัวที่บอกว่า 'ทำไม่ได้หรอก' เป็นเพียงภาพลวงตาที่คุณสร้างขึ้นมาจากความกลัว ลองตะโกนกลับไปดังๆ ว่า 'ฉันทำได้และฉันจะทำให้ดู!' ความกล้าหาญไม่ได้หมายถึงการไม่กลัว แต่คือการลงมือทำทั้งๆ ที่ยังกลัวต่างหาก",
            "29. เมื่อถึงจุดที่ต้องปล่อยมือจากบางสิ่ง ขอให้คุณปล่อยมันไปด้วยความเข้าใจ ไม่ใช่ด้วยความเคียดแค้น การปล่อยวางคือการให้ของขวัญชิ้นใหญ่กับตัวเอง เพื่อให้สองมือของคุณว่างพอที่จะเอื้อมไปคว้ารับสิ่งใหม่ๆ ที่ดีกว่าเดิม",
            "30. ฉันเชื่อมั่นในศักยภาพของคุณ แม้ในวันที่คุณอาจจะสงสัยในตัวเอง ขอให้คำพูดนี้เป็นเหมือนอ้อมกอดอุ่นๆ ที่โอบล้อมหัวใจคุณไว้ คุณเดินมาไกลมากแล้วนะ และฉันรู้ว่าคุณจะเดินต่อไปข้างหน้าได้อย่างงดงามและสง่างามที่สุด",
            "31. เหมือนกับการสร้างบ้านที่ต้องเริ่มจากการลงเสาเข็มให้ลึกและแน่นหนา ความสำเร็จของคุณก็เช่นกัน มันอาจจะใช้เวลาในช่วงแรกนานหน่อยในการมองหาตัวตนและสร้างรากฐาน แต่มันจะมั่นคงต้านลมพายุได้ดีที่สุดเลยล่ะ",
            "32. หากรู้สึกว่าวันนี้ใช้พลังงานหมดไปจนเหลือศูนย์ อนุญาตให้ตัวเองชัตดาวน์พักเบรก ไม่ต้องคิดถึงงาน ไม่ต้องแคร์ความคาดหวังใคร กลับมาซ่อมแซมและดูแลจิตใจตัวเองให้ดีก่อน เพราะเครื่องยนต์ดีๆ ก็ต้องมีการเติมน้ำมันพักเครื่องบ้าง",
            "33. ตัวละครในเรื่องแต่งที่คุณชอบอ่าน มักจะเจอกับอุปสรรคแสนสาหัสก่อนจะพบกับตอนจบที่มีความสุข ชีวิตของคุณก็คือเรื่องราวที่กำลังดำเนินอยู่เช่นกัน คุณคือนักเขียนที่คุมพล็อตเรื่องนี้ จงสร้างตอนจบที่คุ้มค่ากับความพยายามของคุณนะ",
            "34. ร่องรอยของบาดแผลหรือความผิดพลาดในอดีต ไม่ใช่ตำหนิที่ทำให้คุณดูด้อยค่า แต่มันคือลวดลายที่สลักให้คุณกลายเป็นคนที่เข้มแข็งและลึกซึ้งขึ้น เหมือนสถาปัตยกรรมเก่าแก่ที่ยิ่งผ่านกาลเวลาก็ยิ่งทรงคุณค่าและงดงาม",
            "35. บางครั้งโลกก็ส่งเรื่องราวไม่คาดฝันมาให้เราตั้งรับไม่ทัน แต่จงเชื่อในสัญชาตญาณและความสามารถในการเอาตัวรอดของคุณ คุณเคยผ่านวันที่แย่ที่สุดมาแล้ว และคุณก็ยังยืนหยัดอยู่ตรงนี้ได้ ครั้งนี้คุณก็จะผ่านมันไปได้เหมือนเคย",
            "36. ความจริงใจที่คุณมอบให้คนอื่นเป็นสิ่งสวยงามเสมอ แม้บางครั้งอาจจะไม่ได้รับสิ่งนั้นตอบแทน แต่ขออย่าให้มันเปลี่ยนหัวใจที่อ่อนโยนของคุณไป โลกนี้ยังต้องการความใจดีของคุณนะ และสักวันความใจดีนั้นจะสะท้อนกลับมาปกป้องคุณเอง",
            "37. ทุกความตั้งใจของคุณ ไม่ว่าจะเป็นการดูแลใครสักคน การพยายามอ่านหนังสือ หรือการทำงานให้ออกมาดีที่สุด มันถูกบันทึกไว้ในจักรวาลนี้แล้วว่าคุณเป็นคนที่ยอดเยี่ยมแค่ไหน อย่าลืมตอบแทนความทุ่มเทของตัวเองด้วยการใจดีกับตัวเองบ้างนะ",
            "38. คุณอาจจะรู้สึกว่าตัวเองยังไม่เก่งพอ ยังไปไม่ถึงฝัน แต่ถ้าลองมองย้อนกลับไปดูตัวเองเมื่อห้าปีที่แล้ว คุณจะเห็นว่าคุณเติบโตขึ้นมากแค่ไหน ก้าวข้ามผ่านอะไรมาบ้าง จงให้เครดิตกับพัฒนาการของตัวเองด้วย คุณเก่งขึ้นทุกวันเลยนะ",
            "39. ท่ามกลางความวุ่นวายของวัน ขอให้คุณหาช่วงเวลาเงียบๆ สัก 5 นาทีเพื่อหลับตา สูดหายใจลึกๆ และฟังเสียงเต้นของหัวใจตัวเอง เสียงนั้นคือสัญญาณของการมีชีวิตอยู่ เป็นเครื่องพิสูจน์ว่าคุณพร้อมที่จะสู้กับทุกปัญหาในโลกความจริง",
            "40. ขอให้ความมุ่งมั่นของคุณเปล่งประกายเหมือนแสงอาทิตย์ในยามเช้า และความสงบในใจของคุณเยือกเย็นเหมือนแสงจันทร์ในยามค่ำคืน รักษาสมดุลของชีวิตให้ดี เพราะชีวิตไม่ได้มีแค่งาน หรือหน้าที่ แต่มีความสุขของคุณรวมอยู่ด้วย",
            "41. ไม่ว่าคุณกำลังรอคอยความสำเร็จหรือคำตอบบางอย่างอยู่ ขอให้รอด้วยใจที่ร่มเย็น ทุกอย่างมีไทม์ไลน์ที่เหมาะสมของมัน การเร่งรัดธรรมชาติมีแต่จะทำให้เราเหนื่อยเปล่า ทำหน้าที่ของวันนี้ให้ดีที่สุด แล้วผลลัพธ์ที่งดงามจะตามมาเอง",
            "42. ความรักที่คุณมีให้กับสิ่งที่ทำจะเป็นพลังขับเคลื่อนที่ไม่มีวันหมด แม้จะมีบางวันที่เหนื่อยล้าจนอยากโยนทุกอย่างทิ้ง ขอให้หลับตาแล้วนึกถึงความรู้สึกแรกที่ทำให้คุณเริ่มต้นทำมัน ความรักนั้นจะช่วยจุดไฟในใจคุณให้ลุกโชนขึ้นอีกครั้ง",
            "43. มีความสุขกับสิ่งเล็กๆ รอบตัวให้มากขึ้น สังเกตสีของท้องฟ้า ฟังเสียงลมที่พัดผ่านใบไม้ หรือการได้ดื่มเครื่องดื่มแก้วโปรด ความสุขไม่ได้ซ่อนอยู่ที่เส้นชัย แต่อยู่ในรายละเอียดเล็กๆ น้อยๆ ระหว่างทางที่คุณเดินผ่านต่างหาก",
            "44. คุณสมควรได้รับความรักที่ดี ความซื่อสัตย์ และความเคารพจากคนรอบข้าง อย่าลดคุณค่าของตัวเองเพื่อรักษาใครไว้ในชีวิต เพราะคนที่รักคุณจริงจะมองเห็นคุณค่าของคุณเสมอ และพวกเขาจะอยู่เคียงข้างคุณไม่ว่าในวันแดดออกหรือพายุเข้า",
            "45. อุปสรรคที่คุณกำลังเผชิญหน้าอยู่ตอนนี้ คือด่านทดสอบที่ถูกส่งมาเพื่ออัปเกรดให้คุณกลายเป็นเวอร์ชันที่ดีที่สุดของตัวเอง เมื่อคุณก้าวข้ามมันไปได้ คุณจะหันกลับมามองมันด้วยรอยยิ้ม และขอบคุณตัวเองที่ไม่ยอมแพ้ไปเสียก่อน",
            "46. การให้อภัยตัวเองคือจุดเริ่มต้นของการเยียวยาจิตใจ ปลดปล่อยความรู้สึกผิดที่แบกไว้บนบ่าลงเสียบ้าง คุณคือมนุษย์คนหนึ่งที่มีสิทธิ์ทำพลาดได้ เก็บความผิดพลาดนั้นไว้เป็นครูผู้สอนใจ ไม่ใช่โซ่ตรวนที่ล่ามคุณไว้กับอดีต",
            "47. ขอให้คุณมีสุขภาพกายที่แข็งแรงและสุขภาพใจที่เบิกบาน เพราะสองสิ่งนี้คืออาวุธที่สำคัญที่สุดในการออกไปเผชิญโลกกว้าง ดูแลอาหารการกิน พักผ่อนให้เพียงพอ และเติมเสียงหัวเราะให้ชีวิตในทุกๆ วันนะ",
            "48. หากโลกนี้มีคนนับล้านคนที่มีความฝัน คุณก็เป็นหนึ่งในนั้นที่มีสิทธิ์ทำให้ฝันเป็นจริง จงเชื่อมั่นในศักยภาพของตัวเอง อย่าปล่อยให้เสียงวิจารณ์ของใครมาทำให้คุณสะดุดล้ม คุณคือเจ้าของชีวิต และคุณมีสิทธิ์กำหนดเส้นทางของตัวเอง",
            "49. ดอกไม้แต่ละชนิดบานในฤดูกาลที่ต่างกัน คุณเองก็เช่นกัน ไม่ต้องเอาตัวเองไปเปรียบเทียบกับความสำเร็จของใคร คุณมีช่วงเวลาเบ่งบานที่สวยงามในแบบฉบับของคุณเอง เตรียมพร้อมรับแสงแดดและสายฝน เพื่อรอวันที่จะผลิดอกอย่างงดงาม",
            "50. ฉันขอส่งพลังใจก้อนใหญ่ๆ ให้คุณในวันนี้ ขอให้เป็นวันที่ราบรื่นและมีแต่เรื่องราวดีๆ เข้ามาหา หากเจอเรื่องขุ่นมัวก็ขอให้ปัดเป่ามันออกไปได้อย่างง่ายดาย ยิ้มกว้างๆ ให้กับตัวเองในกระจกนะ คุณเก่งและคู่ควรกับความสุขที่สุดเลย",
            "51. รางวัลของความพยายาม ไม่ได้มาในรูปแบบของตัวเงินหรือถ้วยรางวัลเสมอไป แต่มันมาในรูปแบบของความภาคภูมิใจในตัวเองที่คุณสามารถสัมผัสได้จากข้างใน เก็บรักษาความรู้สึกนั้นไว้ให้ดี มันคือทรัพย์สินที่มีค่าที่สุด",
            "52. บางทีการได้เขียนระบายความรู้สึก หรือแต่งกลอนสักบท ก็ช่วยให้ตะกอนในใจตกผลึกได้ดีนะ ให้ตัวอักษรช่วยคุณจัดการกับความวุ่นวายในหัว แล้วคุณจะพบว่าเมื่อความรู้สึกถูกถ่ายทอดออกมา หัวใจคุณจะเบาสบายขึ้นเยอะเลย",
            "53. ประวัติศาสตร์สอนให้รู้ว่า อาณาจักรที่ยิ่งใหญ่ล้วนต้องเผชิญกับสงครามและความสูญเสียก่อนจะรุ่งเรือง ชีวิตของคุณก็เช่นกัน ปัญหาที่เจอในวันนี้คือบททดสอบความแข็งแกร่ง เพื่อสร้างอาณาจักรความสุขที่ยั่งยืนในอนาคต",
            "54. การทำงานกับหรือตรรกะซับซ้อนอาจทำให้สมองล้า อย่าลืมลุกไปเดินยืดเส้นยืดสาย มองสีเขียวของต้นไม้บ้าง การเบรกสายตาจากหน้าจอคอมพิวเตอร์คือการรีเฟรชระบบการทำงานของสมองชั้นดีเลยล่ะ",
            "55. ถ้าวันนี้คุณแก้โจทย์ปัญหาหรือหาคำตอบไม่ได้ ไม่ได้แปลว่าคุณโง่หรือไร้ความสามารถ มันแค่หมายความว่าคุณยังไม่เจอชิ้นส่วนจิ๊กซอว์ที่ถูกต้องเท่านั้นเอง ลองถอยออกมามองภาพรวมกว้างๆ คุณอาจจะเห็นคำตอบที่ซ่อนอยู่ก็ได้นะ",
            "56. ขอให้คุณรักษามิตรภาพที่คอยซัพพอร์ตกันไว้ให้แน่นแฟ้น คนที่พร้อมจะรับฟังปัญหาและหัวเราะไปกับมุกตลกของคุณคือสมบัติล้ำค่า จงตอบแทนพวกเขาด้วยความจริงใจ และเป็นกัลยาณมิตรที่ดีให้กันและกันตลอดไปนะ",
            "57. ความรักที่มั่นคงเหมือนสถาปัตยกรรมที่ออกแบบมาอย่างดี ไม่ได้หวือหวาแต่แข็งแรงต้านทานได้ทุกฤดูกาล ขอให้คุณมีความรักที่คอยเป็นเซฟโซน เป็นที่พักพิงใจที่อุ่นที่สุดในวันที่โลกภายนอกหนาวเหน็บ",
            "58. คุณมีความสามารถในการรังสรรค์สิ่งสวยงาม ไม่ว่าจะเป็นภาพวาด บทกวี หรืองานออกแบบ จงใช้ความสามารถนี้สร้างรอยยิ้มให้กับตัวเองและผู้คนรอบข้าง โลกนี้ต้องการศิลปะของคุณเพื่อเยียวยาจิตใจนะ",
            "59. อย่ากลัวที่จะเริ่มทำโปรเจกต์ใหม่ๆ หรือเรียนรู้สิ่งที่ไม่เคยทำมาก่อน ความเสี่ยงคือบัตรผ่านประตูสู่ความสำเร็จที่ยิ่งใหญ่กว่า ต่อให้ผลลัพธ์จะไม่เป็นไปตามคาด แต่อย่างน้อยคุณก็ได้ประสบการณ์ที่ประเมินค่าไม่ได้กลับมา",
            "60. เวลาที่รู้สึกกดดัน ลองหลับตานึกถึงความรู้สึกตอนที่คุณเล่นเกมชนะหรือตอนที่ผลงานของคุณได้รับการชื่นชม จำความรู้สึกตื่นเต้นและภูมิใจตอนนั้นให้แม่น แล้วดึงมันกลับมาเป็นเชื้อเพลิงในการทำงานต่อนะ",
            "61. วันนี้คุณเก่งมากแล้ว พรุ่งนี้คุณจะเก่งขึ้นอีก และมะรืนนี้คุณก็จะยิ่งเก่งขึ้นไปอีก พัฒนาการของมนุษย์ไม่มีที่สิ้นสุดตราบใดที่เราไม่หยุดเรียนรู้ ขอให้สนุกกับการอัปเกรดตัวเองเป็นเวอร์ชันที่ดีขึ้นในทุกๆ วัน",
            "62. ไม่ว่าใครจะมองคุณยังไง สิ่งสำคัญที่สุดคือคุณมองตัวเองยังไง ขอให้คุณมองเห็นประกายความสามารถในตัวเอง มองเห็นความตั้งใจอันบริสุทธิ์ และมองเห็นหัวใจที่พร้อมจะสู้ไม่ถอยของคุณนะ",
            "63. ความสำเร็จไม่ใช่กุญแจสู่ความสุข แต่ความสุขต่างหากคือกุญแจสู่ความสำเร็จ ถ้าคุณรักในสิ่งที่คุณทำ คุณจะประสบความสำเร็จอย่างแน่นอน ขอให้ทำงานทุกอย่างด้วยใจที่เบิกบานและสนุกไปกับมันนะ",
            "64. หากต้องเลือกระหว่างความสมบูรณ์แบบกับความก้าวหน้า จงเลือกความก้าวหน้า เพราะความสมบูรณ์แบบคือภาพลวงตา แต่ความก้าวหน้าคือของจริง การก้าวไปข้างหน้าทีละนิด ดีกว่าการย่ำอยู่กับที่เพื่อรอให้ทุกอย่างเพอร์เฟกต์",
            "65. บางเรื่องในชีวิตเราก็ควบคุมไม่ได้ ปล่อยให้สายลมและโชคชะตาทำหน้าที่ของมันไป ส่วนเรามีหน้าที่ทำในสิ่งที่ควบคุมได้ให้ดีที่สุด นั่นคือการเตรียมตัวเองให้พร้อมรับมือกับทุกสถานการณ์ด้วยสติและปัญญา",
            "66. ขอให้บทเพลงที่คุณชอบฟังช่วยเยียวยาความเหนื่อยล้า ให้หนังสือที่คุณชอบอ่านช่วยเปิดโลกจินตนาการ และให้คนที่คุณรักช่วยโอบกอดความกังวลของคุณไว้ อนุญาตให้ตัวเองได้รับการปลอบประโลมบ้างนะ",
            "67. การรู้จักปฏิเสธในสิ่งที่ไม่ใช่เป้าหมายของตัวเอง ไม่ใช่ความเห็นแก่ตัว แต่เป็นการเคารพเวลาและคุณค่าของตัวเอง เพื่อเหลือพื้นที่ว่างให้กับสิ่งที่สำคัญและมีความหมายกับชีวิตของคุณจริงๆ",
            "68. เมื่อคุณรู้สึกว่าแบกรับความคาดหวังของคนอื่นไว้จนหนักอึ้ง ลองวางมันลงแล้วถามตัวเองว่า 'เราต้องการอะไรจริงๆ' ซื่อสัตย์กับความรู้สึกตัวเอง แล้วเดินตามเสียงเรียกของหัวใจตัวเองดีกว่านะ",
            "69. ความล้มเหลวไม่ใช่ขั้วตรงข้ามของความสำเร็จ แต่มันเป็นส่วนหนึ่งของความสำเร็จ ทุกๆ คนที่ประสบความสำเร็จล้วนเคยล้มเหลวมาก่อนทั้งนั้น จงลุกขึ้นปัดฝุ่นที่หัวเข่า แล้วเดินหน้าต่อไปด้วยบทเรียนที่ได้มา",
            "70. ขอให้คุณมีดวงตาที่มองเห็นความงามในสิ่งธรรมดา มีหูที่ได้ยินเสียงกระซิบของธรรมชาติ และมีหัวใจที่สัมผัสได้ถึงความรักที่อยู่รอบตัว เพราะสิ่งเหล่านี้คือยาวิเศษที่ช่วยให้ชีวิตมีความสุขในทุกๆ วัน",
            "71. อย่าลืมชื่นชมตัวเองบ้างในวันที่คุณสามารถจัดการอารมณ์ด้านลบได้อย่างอยู่หมัด การควบคุมจิตใจตัวเองได้คือสุดยอดวิทยายุทธ์ที่คุณต้องใช้เวลาฝึกฝน คุณเก่งมากที่ทำมันได้ในวันนี้",
            "72. หากเปรียบชีวิตเป็นเหมือนหน้ากระดาษ วันนี้อาจจะเป็นหน้าที่เต็มไปด้วยรอยขีดเขียนที่ยุ่งเหยิง แต่นั่นก็ไม่ได้แปลว่าหน้าถัดไปจะไม่สามารถวาดรูปที่สวยงามได้ เปิดหน้าใหม่แล้ววาดความหวังลงไปนะ",
            "73. ความแข็งแกร่งไม่ได้วัดกันที่ว่าคุณล้มกี่ครั้ง แต่วัดกันที่ว่าคุณสามารถลุกขึ้นมาได้เร็วแค่ไหนทุกครั้งที่ล้ม จงสปริงตัวขึ้นมาด้วยความเข้มแข็ง และยิ้มเยาะให้กับการล้มครั้งที่ผ่านมา",
            "74. ทุกๆ ปัญหาที่คุณแก้ได้ในวันนี้ จะกลายเป็นทักษะติดตัวที่ทำให้คุณรับมือกับปัญหาที่ใหญ่กว่าในอนาคตได้สบายๆ มองปัญหาให้เป็นเควสต์ที่ต้องเก็บเลเวล แล้วคุณจะสนุกกับการหาวิธีเอาชนะมัน",
            "75. ขอให้คุณรักษาความเป็นเด็กในตัวเองเอาไว้เสมอ ความอยากรู้อยากเห็น ความช่างฝัน และความเชื่อว่าทุกอย่างเป็นไปได้ จะทำให้ชีวิตของคุณมีสีสันและไม่น่าเบื่อ",
            "76. ความเงียบสงบในบางครั้งก็เป็นเพื่อนที่ดีที่สุด มันช่วยให้เราได้ยินเสียงความคิดของตัวเองชัดเจนขึ้น ลองให้เวลาตัวเองได้อยู่เงียบๆ ไม่ต้องพึ่งพาโซเชียลมีเดียดูบ้าง แล้วคุณจะพบความสงบในใจ",
            "77. ไม่ว่าเป้าหมายของคุณจะยิ่งใหญ่แค่ไหน ซอยมันออกเป็นเป้าหมายเล็กๆ แล้วลงมือทำทีละสเต็ป การเก็บชัยชนะเล็กๆ ในทุกวัน จะช่วยสร้างโมเมนตัมให้คุณพุ่งทะยานไปสู่เป้าหมายใหญ่ได้สำเร็จ",
            "78. ความคิดสร้างสรรค์ของคุณคือทรัพยากรที่มีค่าที่สุด อย่าปล่อยให้มันเหือดแห้ง เติมอาหารสมองด้วยการดูงานศิลปะ อ่านหนังสือ หรือออกเดินทางไปพบเจอสิ่งใหม่ๆ เพื่อสร้างแรงบันดาลใจให้ตัวเองเสมอ",
            "79. ขอให้คุณเป็นคนที่มีความยืดหยุ่นเหมือนน้ำ ที่สามารถปรับตัวเข้ากับทุกภาชนะที่รองรับ เมื่อเจอกับสถานการณ์ที่เปลี่ยนแปลงกะทันหัน ความยืดหยุ่นจะช่วยให้คุณไหลลื่นผ่านอุปสรรคไปได้อย่างง่ายดาย",
            "80. การขอโทษเมื่อทำผิดคือความกล้าหาญ และการให้อภัยคนที่ทำผิดคือความเมตตา ขอให้คุณมีทั้งความกล้าหาญและความเมตตานี้ในใจเสมอ เพื่อสร้างความสัมพันธ์ที่ดีกับคนรอบข้างและตัวเอง",
            "81. แม้ว่าท้องฟ้าในใจคุณวันนี้อาจจะมีเมฆหมอกปกคลุม แต่อย่าลืมว่าเหนือเมฆหมอกนั้นยังคงมีแสงแดดที่อบอุ่นซ่อนอยู่เสมอ รอให้พายุพัดผ่านไป แล้วท้องฟ้าของคุณจะกลับมาสดใสอีกครั้ง",
            "82. ความเป็นมืออาชีพของคุณไม่เพียงแค่อยู่ที่ผลงานที่ยอดเยี่ยม แต่อยู่ที่ทัศนคติที่ดีในการทำงาน การรับฟังความคิดเห็น และความรับผิดชอบที่คุณมีต่อหน้าที่ จงรักษามาตรฐานที่ดีนี้ไว้นะ",
            "83. อย่าเอาความสุขของคุณไปผูกไว้กับผลลัพธ์ที่คุณควบคุมไม่ได้ จงมีความสุขกับกระบวนการลงมือทำ การได้เห็นตัวเองตั้งใจทำอะไรสักอย่างอย่างเต็มที่ นั่นแหละคือความสุขที่แท้จริงและยั่งยืน",
            "84. ขอให้คุณมีกำลังใจที่เข้มแข็งพอที่จะยืนหยัดเพื่อความถูกต้อง แม้ในวันที่ต้องยืนอยู่เพียงลำพัง ความกล้าหาญทางจริยธรรมนี้คือสิ่งที่จะทำให้คุณเคารพตัวเองได้อย่างแท้จริง",
            "85. เวลาที่คุณรู้สึกท้อ ลองนึกถึงคนที่เขารักและเชื่อมั่นในตัวคุณ สายตาแห่งความหวังของพวกเขาจะเป็นพลังชั้นดีที่ช่วยฉุดคุณขึ้นมาจากความสิ้นหวัง อย่าลืมทำเพื่อตัวเองและคนที่รักคุณนะ",
            "86. ความผิดพลาดเล็กๆ น้อยๆ ในอดีต ไม่ได้กำหนดว่าคุณจะเป็นคนล้มเหลวในอนาคต มันเป็นเพียงป้ายบอกทางที่เตือนให้คุณระมัดระวังมากขึ้นในการเดินทางครั้งต่อไปเท่านั้นเอง",
            "87. ขอให้คุณสนุกกับการค้นพบความสามารถใหม่ๆ ในตัวเอง อย่าเพิ่งตีกรอบว่าตัวเองทำได้แค่นี้ ลองทำในสิ่งที่ไม่เคยทำ คุณอาจจะพบว่าตัวเองมีพรสวรรค์ซ่อนอยู่อีกมากมายเลยก็ได้",
            "88. การดูแลตัวเองไม่ใช่การตามใจตัวเองจนเสียคน แต่คือการรักษาสมดุลให้กับชีวิต รู้จักให้รางวัลตัวเองเมื่อทำสำเร็จ และรู้จักมีวินัยเมื่อต้องมุ่งมั่นไปสู่เป้าหมาย",
            "89. ความสุขของคุณไม่ได้มีราคาแพงเสมอไป การได้กินข้าวไข่เจียวร้อนๆ การได้นอนเตียงนุ่มๆ หรือการได้ดูซีรีส์เรื่องโปรด ก็สามารถชาร์จพลังใจให้เต็มร้อยได้แล้ว",
            "90. ขอให้คุณมีความมั่นคงทางอารมณ์ที่จะไม่หวั่นไหวไปกับคำวิจารณ์ที่ไม่มีประโยชน์ รับฟังเฉพาะคำติชมที่สร้างสรรค์ และปล่อยผ่านคำพูดที่บั่นทอนจิตใจไปเสีย",
            "91. ชีวิตคือการผสมผสานระหว่างช่วงเวลาที่ง่ายดายและช่วงเวลาที่ยากลำบาก ยอมรับความจริงข้อนี้ให้ได้ แล้วคุณจะรับมือกับความผันผวนของชีวิตด้วยความสงบและเข้าใจ",
            "92. อย่าลืมที่จะขอบคุณตัวเองในทุกๆ คืน ขอบคุณร่างกายที่ทนทาน ขอบคุณสมองที่คิดแก้ปัญหา และขอบคุณหัวใจที่ไม่เคยหยุดเต้น คุณคือนักสู้ที่ยอดเยี่ยมที่สุดของตัวเอง",
            "93. ความฝันของคุณมีค่าพอที่คุณจะสละเวลาและหยาดเหงื่อเพื่อมัน อย่าให้ใครมาบอกว่าฝันของคุณไร้สาระ ถ้ามันมีความหมายกับคุณ มันก็คือสิ่งที่ยิ่งใหญ่เสมอ",
            "94. ขอให้คุณมีสติรู้เท่าทันความคิดของตัวเอง เมื่อความคิดลบเริ่มก่อตัว ให้ใช้สติจับมันให้อยู่ แล้วเปลี่ยนมันเป็นพลังบวกที่จะผลักดันให้คุณเดินหน้าต่อไป",
            "95. การสร้างคุณค่าให้ตัวเอง ไม่ได้ทำเพื่อให้คนอื่นยอมรับ แต่ทำเพื่อให้ตัวคุณเองรู้ว่าคุณคู่ควรกับสิ่งที่ดีที่สุดในชีวิต จงพัฒนาตัวเองอย่างสม่ำเสมอเพื่อตัวคุณเองนะ",
            "96. เวลาที่คุณรู้สึกเหนื่อยจนก้าวขาไม่ออก ให้มองไปที่ปลายเท้าตัวเองแล้วบอกว่า 'ขอแค่ก้าวเดียว ก้าวเดียวเท่านั้น' เมื่อคุณเริ่มก้าวแรกได้ ก้าวต่อไปก็จะตามมาเอง",
            "97. ขอให้คุณมีความซื่อสัตย์ต่อความรู้สึกของตัวเอง โกรธก็รู้ว่าโกรธ เสียใจก็รู้ว่าเสียใจ การยอมรับอารมณ์ตามความเป็นจริงคือจุดเริ่มต้นของการจัดการกับมันอย่างถูกต้อง",
            "98. ทุกวันที่พระอาทิตย์ขึ้น คือโอกาสใหม่ที่คุณได้รับเพื่อเริ่มต้นทำสิ่งดีๆ อย่าปล่อยให้โอกาสนี้หลุดลอยไปโดยเปล่าประโยชน์ ทำวันนี้ให้ดีที่สุดเท่าที่คุณจะทำได้",
            "99. ความภูมิใจที่ยิ่งใหญ่ที่สุด มักเกิดจากการที่คุณสามารถเอาชนะความอ่อนแอของตัวเองได้สำเร็จ จงท้าทายตัวเองให้ก้าวข้ามขีดจำกัดไปทีละนิด แล้วคุณจะทึ่งในตัวเอง",
            "100. สุดท้ายนี้ ขอให้จำไว้ว่าคุณเป็นคนเก่งที่มีคุณค่ามาก โลกใบนี้โชคดีที่มีคุณอยู่ ขอให้คุณเปล่งประกายในแบบของคุณ และมีความสุขกับเส้นทางชีวิตที่คุณเลือกเดินนะ"
        ];

        // สับเปลี่ยนลำดับข้อความเพื่อให้แต่ละใบดึงมาไม่เหมือนกัน (Shuffle Array)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        
        // เราจะไม่ shuffle ตลอดเพื่อรักษาข้อความให้ตรงกับ Index ของ Firebase
        // แต่เพื่อให้ได้ 100 ข้อความ เราจะเรียงไปตาม index เลย
        const TOTAL_TABS = 100;
        const tabsContainer = document.getElementById('tabsContainer');

        // ฟังก์ชันสร้างกระดาษบนหน้าจอ
        function renderTabs() {
            tabsContainer.innerHTML = '';
            for (let i = 0; i < TOTAL_TABS; i++) {
                const tab = document.createElement('div');
                tab.className = 'tear-tab';
                tab.id = `tab-${i}`;
                
                // ใส่ตัวเลขเล็กๆ เพื่อให้ดูเหมือนมีลำดับ
                const numberSpan = document.createElement('span');
                numberSpan.className = 'tab-number';
                numberSpan.innerText = i + 1;
                tab.appendChild(numberSpan);

                tab.addEventListener('click', () => handleTearTab(i, tab));
                tabsContainer.appendChild(tab);
            }
        }

        // ฟังก์ชันเมื่อผู้ใช้กดดึงกระดาษ
        function handleTearTab(index, tabElement) {
            const dbRef = ref(db, 'tabs/tab_' + index);
            
            // เช็คสถานะก่อนดึงว่ามีคนดึงไปหรือยัง (Real-time check)
            get(dbRef).then((snapshot) => {
                const isTorn = snapshot.val();
                if (isTorn) {
                    Swal.fire({
                        icon: 'error',
                        title: 'อุ๊ย!',
                        text: 'กระดาษใบนี้มีคนดึงไปแล้วล่ะ ลองใบอื่นนะ',
                        confirmButtonColor: '#333'
                    });
                    return;
                }

                // อัปเดตใน Firebase ว่าถูกดึงแล้ว
                set(dbRef, true).then(() => {
                    // เล่นแอนิเมชันฉีกกระดาษ
                    tabElement.classList.add('torn');
                    
                    // โชว์ข้อความ (ดีเลย์นิดหน่อยให้แอนิเมชันเริ่มก่อน)
                    setTimeout(() => {
                        showEncouragement(index);
                    }, 500);
                });
            });
        }

        // แสดง Pop-up ข้อความ
        function showEncouragement(index) {
            Swal.fire({
                title: 'รางวัลของคุณ',
                text: messages[index],
                customClass: {
                    popup: 'paper-popup'
                },
                confirmButtonText: 'เก็บเข้าหัวใจ',
                confirmButtonColor: '#555',
                showClass: {
                    popup: 'animate__animated animate__fadeInUp'
                },
                hideClass: {
                    popup: 'animate__animated animate__fadeOutDown'
                }
            });
        }

        // --- ส่วนการทำงานแบบ Real-time ---
        // เมื่อเปิดหน้าเว็บ หรือมีคนอื่นดึงกระดาษ Firebase จะส่งข้อมูลมาอัปเดตทันที
        renderTabs(); // สร้าง UI ก่อน

        const tabsRef = ref(db, 'tabs');
        onValue(tabsRef, (snapshot) => {
            const data = snapshot.val();
            if (data) {
                for (let i = 0; i < TOTAL_TABS; i++) {
                    const tabElement = document.getElementById(`tab-${i}`);
                    // ถ้าใน Database บอกว่าโดนดึงแล้ว (true) ให้ซ่อนทันที (แหว่ง)
                    if (data[`tab_${i}`] === true) {
                        tabElement.classList.add('empty');
                        // ลบ class torn ออกเผื่อมันเพิ่งเล่นแอนิเมชันเสร็จ จะได้หายไปเลย
                        tabElement.classList.remove('torn');
                    }
                }
            } else {
                // ครั้งแรกที่ยังไม่มี Database เลย ให้เซ็ตเป็น false (ยังไม่ถูกดึง) ทั้งหมด
                let initialData = {};
                for (let i = 0; i < TOTAL_TABS; i++) {
                    initialData[`tab_${i}`] = false;
                }
                set(ref(db, 'tabs'), initialData);
            }
        });
    </script>
</body>
</html>

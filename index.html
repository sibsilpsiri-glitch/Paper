<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รางวัลสำหรับคนเก่ง ssucommu</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg-color: #2b2b2b;
            --paper-color: #fdfbf7;
            --text-main: #1a1a1a;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Kanit', sans-serif;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(circle, #3a3a3a 1px, transparent 1px);
            background-size: 20px 20px;
        }

        /* โครงสร้างกระดาษหลัก */
        .poster-container {
            width: 90%;
            max-width: 450px;
            margin-top: 40px;
            margin-bottom: 80px;
            position: relative;
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.4));
        }

        .poster-main {
            background-color: var(--paper-color);
            padding: 40px 30px;
            text-align: center;
            position: relative;
            z-index: 2;
            background-image: linear-gradient(to bottom, transparent 95%, rgba(0,0,0,0.02) 100%);
        }

        .poster-main::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.03);
            pointer-events: none;
        }

        h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        p.desc {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            font-weight: 300;
            margin-bottom: 30px;
        }

        /* คอนเทนเนอร์สำหรับแถบฉีก (เลื่อนซ้ายขวาได้บนมือถือ) */
        .tabs-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            overflow-x: auto;
            scroll-behavior: smooth;
            -ms-overflow-style: none;
            scrollbar-width: none;
            padding-bottom: 20px;
            z-index: 1;
            /* ทำให้ขอบกระดาษดูสมจริง */
            border-top: 2px dashed rgba(0,0,0,0.1);
            background-color: var(--paper-color);
        }

        .tabs-wrapper::-webkit-scrollbar {
            display: none;
        }

        /* แถบกระดาษแต่ละใบ */
        .tab {
            flex: 0 0 45px;
            height: 120px;
            background-color: var(--paper-color);
            border-right: 1px solid rgba(0,0,0,0.08);
            border-left: 1px solid rgba(255,255,255,0.8);
            writing-mode: vertical-rl;
            text-orientation: mixed;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 13px;
            color: #444;
            position: relative;
            transform-origin: top center;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.2s, opacity 0.5s;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.05);
        }

        .tab:hover {
            background-color: #f5f3ef;
            transform: rotateX(15deg) translateY(5px);
            box-shadow: 2px 10px 15px rgba(0,0,0,0.1);
        }

        .tab::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: repeating-linear-gradient(90deg, transparent, transparent 4px, rgba(0,0,0,0.15) 4px, rgba(0,0,0,0.15) 8px);
        }

        /* อนิเมชั่นตอนฉีก และการเว้นช่องโหว่ */
        .tab.torn {
            transform: translateY(200px) rotateZ(15deg) rotateX(45deg);
            opacity: 0;
            pointer-events: none;
        }

        /* Modal สำหรับอ่านข้อความ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .message-paper {
            width: 85%;
            max-width: 400px;
            background: var(--paper-color);
            padding: 40px 30px;
            border-radius: 4px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            text-align: center;
            transform: scale(0.8) rotateY(-90deg);
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            position: relative;
        }

        .modal-overlay.active .message-paper {
            transform: scale(1) rotateY(0deg);
        }

        .message-content {
            font-size: 18px;
            color: var(--text-main);
            line-height: 1.7;
            font-weight: 400;
        }

        .close-btn {
            margin-top: 30px;
            padding: 10px 25px;
            background: #2b2b2b;
            color: #fff;
            border: none;
            border-radius: 20px;
            font-family: 'Kanit', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: #444;
        }
    </style>
</head>
<body>

    <div class="poster-container">
        <div class="poster-main">
            <h1>รางวัลสำหรับคนเก่ง ssucommu</h1>
            <p class="desc">
                คุณอาจจะเจอเรื่องหนักหนามามากมายในวันนี้ หรืออาจจะกำลังรู้สึกเหนื่อยล้า 
                โปรดรู้ไว้ว่าคุณทำได้ดีมากๆ แล้ว เลือกดึงข้อความด้านล่างนี้ไปเป็นรางวัลแห่งความตั้งใจของคุณนะ 
                (เมื่อดึงไปแล้ว กระดาษใบนี้จะเป็นของคุณเพียงคนเดียว)

        </div>
        <div class="tabs-wrapper" id="tabsContainer">

        </div>
    </div>

// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {

        // --- ส่วนที่ 2: ข้อความกำลังใจ 100 ข้อความ ---
        const encouragements = [
            "1. ไม่ว่าวันนี้จะเจอเรื่องหนักหนาแค่ไหน ขอให้รู้ไว้ว่าคุณเก่งมากๆ ที่ผ่านมันมาได้จนถึงวินาทีนี้ พักผ่อนให้เต็มที่นะ",
            "2. รอยยิ้มของคุณมีค่าเสมอ อย่าลืมยิ้มให้กับความพยายามของตัวเองในทุกๆ วัน คุณทำได้ดีที่สุดแล้วล่ะ",
            "3. ความผิดพลาดไม่ใช่จุดจบ แต่เป็นบทเรียนที่ทำให้คุณเติบโตขึ้นอย่างแข็งแกร่ง ภูมิใจในตัวเองให้มากๆ นะ",
            "4. บางครั้งการได้นั่งนิ่งๆ ทบทวนสิ่งที่ผ่านมา ก็เป็นการชาร์จพลังที่ดีเยี่ยม อนุญาตให้ตัวเองได้พักบ้างนะคนเก่ง",
            "5. คุณไม่จำเป็นต้องสมบูรณ์แบบในทุกเรื่อง แค่เป็นคุณในแบบที่พยายามทำดีที่สุดในทุกวัน นั่นก็วิเศษมากแล้ว",
            "6. วันที่ท้องฟ้าหม่นหมองไม่ได้แปลว่าพรุ่งนี้จะไม่สดใส อดทนอีกนิดนะ แล้วทุกอย่างจะค่อยๆ ดีขึ้นเอง",
            "7. ท่ามกลางผู้คนมากมายบนโลกใบนี้ มีคุณแค่คนเดียวนะที่แสนพิเศษ จงรักและโอบกอดตัวเองให้มากๆ",
            "8. ก้าวเล็กๆ ที่คุณเดินในทุกวัน มันกำลังพาคุณไปสู่เป้าหมายที่ยิ่งใหญ่เสมอ อย่าเพิ่งท้อกลางทางเสียก่อนล่ะ",
            "9. น้ำตาที่ไหลออกมาไม่ใช่ความอ่อนแอ แต่มันคือการระบายความรู้สึกที่อัดอั้น ร้องไห้บ้างก็ไม่เป็นไรเลยนะ",
            "10. ขอบคุณที่คุณไม่เคยยอมแพ้ต่ออุปสรรคใดๆ ความเข้มแข็งของคุณในวันนี้ จะเป็นเกราะป้องกันที่ดีในอนาคต",
            "11. อย่าเอาตัวเองไปเปรียบเทียบกับใคร ดอกไม้แต่ละดอกผลิบานในเวลาที่ต่างกัน คุณเองก็มีจังหวะเวลาที่สวยงามของตัวเอง",
            "12. พรุ่งนี้คือวันใหม่ โอกาสใหม่ๆ กำลังรอคุณอยู่ ทิ้งความกังวลของวันนี้ไว้ แล้วเริ่มต้นใหม่อย่างสดใสนะ",
            "13. สิ่งที่คุณทำอยู่มันมีความหมายมาก แม้บางครั้งอาจไม่มีใครเห็น แต่คุณรู้ดีที่สุดว่าตัวเองพยายามแค่ไหน",
            "14. ความเหนื่อยล้าบอกเราว่า เราได้ทุ่มเทให้กับบางสิ่งอย่างเต็มที่แล้ว ถึงเวลาให้รางวัลตัวเองด้วยการพักผ่อนสบายๆ",
            "15. เชื่อมั่นในศักยภาพของตัวเองนะ คุณมีพลังซ่อนอยู่มากกว่าที่คุณคิด แค่กล้าที่จะดึงมันออกมาใช้เท่านั้นเอง",
            "16. การใจดีกับตัวเองคือสิ่งสำคัญที่สุด อย่ามัวแต่ดูแลคนอื่นจนลืมถามตัวเองว่า 'วันนี้เหนื่อยไหม' นะ",
            "17. ความสุขไม่ต้องยิ่งใหญ่เสมอไป แค่ได้กินของอร่อย ได้ฟังเพลงที่ชอบ ก็ถือเป็นวันที่ดีมากแล้วล่ะ",
            "18. ไม่ว่าผลลัพธ์จะออกมาเป็นอย่างไร ขอให้รู้ไว้ว่ากระบวนการที่คุณตั้งใจทำนั้น มันล้ำค่าและคู่ควรกับความภูมิใจ",
            "19. ขอให้วันนี้เป็นวันที่ใจดีกับคุณ และขอให้คุณใจดีกับตัวเองให้มากๆ คุณสมควรได้รับความรักจากตัวเองนะ",
            "20. ถ้าวันนี้มันหนักจนแบกไม่ไหว วางมันลงก่อนก็ได้ ไม่ต้องฝืนเข้มแข็งตลอดเวลาหรอกนะ",
            "21. ทุกลมหายใจเข้าออกคือเครื่องยืนยันว่า คุณยังมีชีวิตและมีโอกาสเริ่มต้นใหม่ได้เสมอ หายใจลึกๆ แล้วไปต่อนะ",
            "22. ความกลัวเป็นเรื่องธรรมชาติ แต่มันจะไม่สามารถขวางกั้นความกล้าหาญในตัวคุณได้ คุณเก่งกว่าความกลัวเสมอ",
            "23. ในวันที่ไม่รู้จะหันหน้าไปพึ่งใคร ขอให้ลองมองดูกระจก คนในนั้นแหละที่จะอยู่เคียงข้างคุณเสมอ",
            "24. ทุกบาดแผลที่เกิดขึ้น มันคือร่องรอยของนักสู้ที่ผ่านสมรภูมิชีวิตมาอย่างโชกโชน คุณคือนักสู้ที่ยอดเยี่ยมมาก",
            "25. อย่าลืมชื่นชมตัวเองในเรื่องเล็กๆ น้อยๆ เช่น การตื่นนอนตรงเวลา หรือการดื่มน้ำเพียงพอ เรื่องเล็กๆ ก็มีความหมายนะ",
            "26. ความพยายามไม่เคยทรยศใคร อาจจะเห็นผลช้าหน่อย แต่รับรองว่าผลลัพธ์มันจะคุ้มค่ากับความเหนื่อยแน่นอน",
            "27. คุณไม่ได้อยู่ตัวคนเดียวบนโลกใบนี้นะ อย่างน้อยก็มีข้อความนี้ที่เป็นกำลังใจให้คุณอยู่เสมอ กอดๆ นะ",
            "28. ทิ้งเรื่องแย่ๆ ของเมื่อวานไว้เป็นเพียงแค่อดีต วันนี้คือของขวัญ (Present) ที่คุณสร้างสรรค์สิ่งดีๆ ได้อีกครั้ง",
            "29. เวลาที่เราล้ม เราจะมองเห็นพื้นดินชัดเจนขึ้น เพื่อเรียนรู้ที่จะลุกขึ้นยืนให้มั่นคงกว่าเดิม ลุกขึ้นมานะคนเก่ง",
            "30. เสียงหัวใจของคุณสำคัญที่สุด ฟังเสียงมันบ้างนะ ว่าตอนนี้มันกำลังต้องการอะไร แล้วตอบสนองความต้องการนั้นดู",
            "31. บางทีการหยุดเดินชั่วคราว ก็เพื่อชมความงามของสองข้างทางที่คุณอาจจะมองข้ามไปตอนที่รีบวิ่ง ไม่ต้องรีบนักก็ได้",
            "32. คุณมีความสามารถที่ซ่อนอยู่มากมาย อย่าเพิ่งตัดสินตัวเองจากความล้มเหลวเพียงครั้งเดียว ให้โอกาสตัวเองอีกนิดนะ",
            "33. ไม่ว่าใครจะมองคุณยังไง ไม่สำคัญเท่ากับที่คุณมองเห็นคุณค่าในตัวเอง คุณมีค่าในแบบที่เป็นคุณเสมอ",
            "34. การร้องขอความช่วยเหลือไม่ใช่เรื่องน่าอาย แต่เป็นความกล้าหาญที่ยอมรับว่าเราต้องการใครสักคนต่างหาก",
            "35. ความมืดมิดในยามค่ำคืน มีไว้เพื่อให้เรามองเห็นแสงดาวได้ชัดเจนขึ้น ปัญหาที่เจอตอนนี้ก็เช่นกัน",
            "36. ขอให้ความสุขโอบกอดคุณในทุกๆ วัน แม้จะเป็นความสุขเล็กๆ ก็ตาม ขอให้คุณค้นพบมันอย่างง่ายดาย",
            "37. คุณอาจจะรู้สึกหลงทางในบางครั้ง แต่นั่นก็เพื่อนำทางให้คุณไปพบกับเส้นทางใหม่ๆ ที่ดีกว่าเดิม",
            "38. ร่างกายและจิตใจของคุณทำงานหนักมากเพื่อคุณ อย่าลืมตอบแทนพวกเข ด้วยการพักผ่อนและดูแลตัวเองดีๆ",
            "39. ทุกครั้งที่คุณก้าวผ่านความยากลำบากมาได้ คุณจะพบว่าตัวเองเก่งและอดทนมากขึ้นเสมอ ภูมิใจในตัวเองเยอะๆ",
            "40. อย่าปล่อยให้คำพูดของคนอื่น มากำหนดคุณค่าในตัวคุณ คุณรู้จักตัวเองดีกว่าใคร อย่าหวั่นไหวไปกับเสียงนกเสียงกานะ",
            "41. วันนี้ทำได้แค่นี้ก็เก่งมากแล้ว ไม่ต้องกดดันตัวเองให้ทะลุขีดจำกัดตลอดเวลา พรุ่งนี้ค่อยว่ากันใหม่นะ",

        const totalTabs = 100;
        const container = document.getElementById('tabsContainer');

        // ฟังก์ชันสร้างแถบกระดาษ
        function renderTabs() {
            container.innerHTML = ''; // ล้างของเดิมก่อน
            for (let i = 0; i < totalTabs; i++) {
                const tab = document.createElement('div');
                tab.className = 'tab';
                tab.id = `tab-${i}`;
                tab.innerText = `ดึงฉันสิ #${i+1}`;
                
                // เมื่อกดที่กระดาษ
                tab.addEventListener('click', () => handleTear(i));
                container.appendChild(tab);
            }
            // เริ่มต้นดึงข้อมูลสถานะจาก Firebase
            listenToDatabase();
        }

        // ฟังการเปลี่ยนแปลงจาก Firebase ว่าใบไหนถูกดึงไปแล้ว
        function listenToDatabase() {
            tabsRef.on('value', (snapshot) => {
                const data = snapshot.val();
                
                // ถ้ายังไม่เคยมี data บน Firebase ให้สร้าง array สถานะ [true, true, ...] 100 อัน
                if (!data) {
                    const initialData = Array(totalTabs).fill(true);
                    tabsRef.set(initialData);
                    return;
                }

                // อัปเดตหน้าจอตามสถานะ
                for (let i = 0; i < totalTabs; i++) {
                    const tabEl = document.getElementById(`tab-${i}`);
                    if (!data[i]) {
                        // data[i] เป็น false แปลว่าถูกดึงไปแล้ว
                        if (tabEl && !tabEl.classList.contains('torn')) {
                            // ทำให้กระดาษมีเอฟเฟกต์แหว่ง/หายไป
                            tabEl.classList.add('torn');
                        }
                    }
                }
            });
        }

        // จัดการเมื่อกระดาษถูกคลิก
        function handleTear(index) {
            const tabEl = document.getElementById(`tab-${index}`);
            // ถ้าดึงไปแล้ว ไม่ต้องทำอะไร
            if (tabEl.classList.contains('torn')) return;

            // 1. ทำให้ใบนั้นแหว่งไป (Animation)
            tabEl.classList.add('torn');

            // 2. อัปเดตสถานะขึ้น Firebase ว่าใบที่ index นี้ถูกดึง (false = ไม่อยู่แล้ว)
            tabsRef.child(index).set(false);

            // 3. แสดงข้อความกำลังใจยาวๆ ที่ตรงกับใบนั้น
            setTimeout(() => {
                showModal(encouragements[index]);
            }, 400); // รอจังหวะแอนิเมชันกระดาษฉีกตกลงมาก่อน
        }

        // --- ระบบ Modal แสดงข้อความ ---
        const modal = document.getElementById('modal');
        const messageText = document.getElementById('messageText');

        function showModal(text) {
            // เอาตัวเลขลำดับออกเพื่อความสวยงามตอนอ่าน
            const cleanText = text.replace(/^[0-9]+\.\s/, '');
            messageText.innerText = cleanText;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // สร้างกระดาษตอนเปิดหน้าเว็บ
        renderTabs();

    </script>
</body>

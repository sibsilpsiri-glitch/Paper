<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รางวัลสำหรับคนเก่ง bcucommu</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2b2b2b;
            --paper-color: #fdfbf7;
            --text-color: #333333;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Prompt', sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* ป้องกันการเลื่อนหน้าจอที่ไม่ตั้งใจ */
        }

        /* ส่วนของแผ่นป้ายหลัก */
        .flyer-container {
            width: 90%;
            max-width: 400px;
            background-color: var(--paper-color);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6), inset 0 0 40px rgba(0,0,0,0.03);
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 2px;
            /* เพิ่มเท็กซ์เจอร์กระดาษจางๆ */
            background-image: url('https://www.transparenttextures.com/patterns/dust.png');
        }

        .flyer-header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px dashed #d1d1d1;
        }

        .flyer-header h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 15px 0;
            line-height: 1.4;
            letter-spacing: 0.5px;
        }

        .flyer-header p {
            font-size: 14px;
            font-weight: 300;
            margin: 0;
            color: #666;
        }

        /* ส่วนของแถบกระดาษ 100 อัน (เลื่อนซ้ายขวาได้) */
        .tabs-container {
            display: flex;
            overflow-x: auto;
            /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
            scrollbar-width: none;
            -ms-overflow-style: none;
            padding-bottom: 20px;
            scroll-snap-type: x mandatory;
        }
        
        .tabs-container::-webkit-scrollbar {
            display: none;
        }

        .tab {
            flex: 0 0 auto;
            width: 50px;
            height: 120px;
            background-color: var(--paper-color);
            border-right: 1px solid #e0e0e0;
            border-top: 2px dashed #a0a0a0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transform-origin: top center;
            transition: background-color 0.2s;
            scroll-snap-align: start;
            /* ลายเส้นกระดาษ */
            background-image: url('https://www.transparenttextures.com/patterns/dust.png');
        }

        .tab:hover {
            background-color: #f0eee9;
        }

        .tab-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 13px;
            font-weight: 400;
            color: #555;
            letter-spacing: 1px;
            pointer-events: none;
        }

        /* อนิเมชันตอนดึงกระดาษ */
        .tab.tearing {
            animation: tearDown 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes tearDown {
            0% { transform: rotate(0deg) translateY(0); opacity: 1; }
            50% { transform: rotate(-5deg) translateY(20px); opacity: 0.8; }
            100% { transform: rotate(-15deg) translateY(100px); opacity: 0; }
        }

        /* Modal สำหรับแสดงข้อความหลังพลิกกระดาษ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 1000;
            perspective: 1000px; /* สำหรับ 3D Flip */
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .torn-paper {
            width: 80%;
            max-width: 300px;
            min-height: 200px;
            background-color: var(--paper-color);
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            /* ทำขอบบนให้ดูเหมือนรอยฉีก */
            clip-path: polygon(0% 5%, 5% 0%, 10% 6%, 15% 1%, 20% 7%, 25% 2%, 30% 8%, 35% 0%, 40% 6%, 45% 2%, 50% 8%, 55% 1%, 60% 7%, 65% 2%, 70% 8%, 75% 0%, 80% 6%, 85% 1%, 90% 7%, 95% 2%, 100% 5%, 100% 100%, 0% 100%);
            transform: rotateY(180deg) scale(0.5);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* อนิเมชันเด้งและพลิก */
            transform-style: preserve-3d;
            background-image: url('https://www.transparenttextures.com/patterns/dust.png');
        }

        .modal-overlay.active .torn-paper {
            transform: rotateY(0deg) scale(1);
        }

        .message-text {
            font-size: 20px;
            font-weight: 600;
            line-height: 1.5;
            color: var(--text-color);
            /* ซ่อนข้อความตอนกระดาษยังไม่พลิก */
            backface-visibility: hidden; 
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            font-size: 30px;
            cursor: pointer;
            font-weight: 300;
        }
    </style>
</head>
<body>

    <div class="flyer-container">
        <div class="flyer-header">
            <h1>รางวัลสำหรับคนเก่ง<br>bcucommu</h1>
            <p>ดึงกระดาษเพื่อรับข้อความให้กำลังใจของคุณวันนี้ :)</p>
        </div>
        <div class="tabs-container" id="tabs-container"></div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="close-btn" id="close-modal">&times;</div>
        <div class="torn-paper">
            <div class="message-text" id="message-display"></div>
        </div>
    </div>

    <script>
        // ฐานข้อมูลข้อความให้กำลังใจ (คุณสามารถเพิ่มให้ครบ 100 ข้อความที่ไม่ซ้ำกันได้ที่นี่)
        const encouragingMessages = [
            "เก่งมากเลยนะ วันนี้ทำได้ดีมาก!",
            "พักผ่อนบ้างนะคนเก่ง ร่างกายต้องการการชาร์จแบต",
            "รอยยิ้มของคุณทำให้โลกสดใสขึ้นนะ รู้ตัวไหม",
            "เหนื่อยก็พัก ไม่เป็นไรหรอก พรุ่งนี้ค่อยลุยใหม่",
            "ทุกความพยายามมีความหมายเสมอ อย่าเพิ่งท้อนะ",
            "คุณคือคนสำคัญนะ ภูมิใจในตัวเองให้มากๆ",
            "ท้องฟ้าวันนี้สวยจัง อย่าลืมเงยหน้ามองบ้างนะ",
            "ร้องไห้บ้างก็ได้นะ ความอ่อนแอไม่ใช่เรื่องผิด",
            "คุณเก่งกว่าที่คุณคิดไว้เยอะเลย มั่นใจหน่อย!",
            "กอดๆ นะ วันนี้อาจจะหนัก แต่คุณจะผ่านมันไปได้",
            "อย่าลืมกินของอร่อยๆ เป็นรางวัลให้ตัวเองด้วยล่ะ",
            "ข้อผิดพลาดคือบทเรียน ไม่ใช่บทสรุปของชีวิต",
            "ค่อยๆ ก้าวไปทีละนิด ไม่ต้องรีบแข่งกับใคร",
            "ขอบคุณที่พยายามอย่างหนักมาจนถึงตอนนี้นะ",
            "คุณคู่ควรกับความรักและความสุขบนโลกใบนี้",
            "อนุญาตให้ตัวเองขี้เกียจบ้างในบางวันนะ",
            "ไม่ว่าผลจะเป็นยังไง คุณทำเต็มที่แล้ว เก่งมากๆ",
            "หายใจเข้าลึกๆ... ปล่อยเรื่องเครียดทิ้งไปก่อน",
            "พรุ่งนี้ต้องเป็นวันที่ดีกว่าเดิมแน่นอน",
            "เป็นกำลังใจให้อยู่ตรงนี้นะ สู้ๆ!"
        ];

        // สร้าง Array ให้ครบ 100 อัน (หากข้อความข้างต้นไม่ถึง 100 จะทำการวนลูปซ้ำ)
        const totalTabs = 100;
        const allMessages = [];
        for (let i = 0; i < totalTabs; i++) {
            // สุ่มข้อความจาก array ด้านบนเพื่อกระจายให้ครบ 100 แผ่น
            const randomIndex = Math.floor(Math.random() * encouragingMessages.length);
            allMessages.push(encouragingMessages[randomIndex]);
        }

        const tabsContainer = document.getElementById('tabs-container');
        const modal = document.getElementById('modal');
        const messageDisplay = document.getElementById('message-display');
        const closeModal = document.getElementById('close-modal');

        // ฟังก์ชันสร้างแถบกระดาษ 100 อัน
        for (let i = 0; i < totalTabs; i++) {
            const tab = document.createElement('div');
            tab.className = 'tab';
            tab.innerHTML = '<div class="tab-text">ดึงฉันสิ</div>';
            
            // เมื่อคลิกที่แถบกระดาษ
            tab.addEventListener('click', function() {
                // ป้องกันการกดซ้ำ
                if(this.classList.contains('tearing')) return;

                // 1. เล่นอนิเมชันขาด
                this.classList.add('tearing');

                // 2. รอให้อนิเมชันขาดเล่นไปสักพัก ค่อยโชว์หน้าต่างข้อความพร้อมพลิกกระดาษ
                setTimeout(() => {
                    this.style.visibility = 'hidden'; // ซ่อนกระดาษชิ้นเดิมที่ขาดไปแล้ว
                    messageDisplay.innerText = allMessages[i];
                    modal.classList.add('active');
                }, 500); 
            });

            tabsContainer.appendChild(tab);
        }

        // ปิดหน้าต่างข้อความ
        closeModal.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // แตะพื้นที่ว่างเพื่อปิดได้เช่นกัน
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    </script>
</body>
</html>

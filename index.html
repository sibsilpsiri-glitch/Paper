<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รางวัลสำหรับคนเก่ง bcucommu</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: #2a2a2a; /* พื้นหลังสีเทาเข้ม */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        /* ส่วนของกระดาษแผ่นใหญ่ */
        .paper-container {
            background: #fdfcf8; /* สีขาวกระดาษถนอมสายตา */
            width: 100%;
            max-width: 450px; /* ขนาดพอดีกับมือถือ */
            border-radius: 2px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 40px rgba(0,0,0,0.02);
            position: relative;
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 0, 0, 0.02) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .header-content {
            padding: 40px 30px;
            text-align: center;
            border-bottom: 2px dashed #ccc; /* รอยปรุ */
        }

        .header-content h1 {
            font-size: 24px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .header-content p {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
            margin-bottom: 10px;
        }

        /* ส่วนของแถบดึงกระดาษ 100 อัน */
        .tear-off-area {
            display: flex;
            overflow-x: auto;
            padding: 0;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* ซ่อน scrollbar Firefox */
        }
        .tear-off-area::-webkit-scrollbar {
            display: none; /* ซ่อน scrollbar Chrome/Safari */
        }

        .tear-tab {
            flex: 0 0 40px; /* ขนาดความกว้างของกระดาษแต่ละใบ */
            height: 120px;
            background: #fdfcf8;
            border-right: 1px dashed #d0d0d0;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transform-origin: top;
            transition: all 0.3s ease;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.05);
        }

        /* แอนิเมชันตอนดึงกระดาษ */
        .tear-tab.tearing {
            transform: rotateX(-60deg) translateY(50px) rotateZ(10deg);
            opacity: 0;
            pointer-events: none;
        }

        .tear-tab.torn {
            display: none; /* หายไปเลย */
        }

        .tear-tab span {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 12px;
            color: #333;
            letter-spacing: 2px;
            transform: rotate(180deg);
        }

        /* Modal สำหรับแสดงข้อความหลังดึง */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
            padding: 20px;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .message-paper {
            background: #fdfcf8;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: translateY(50px) rotate(-2deg);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            border-top: 5px jagged #eee;
        }

        /* ทำขอบกระดาษขาดๆ สมจริง */
        .message-paper::before {
            content: "";
            position: absolute;
            top: -10px; left: 0; right: 0;
            height: 10px;
            background-image: radial-gradient(circle at 10px 0, transparent 11px, #fdfcf8 12px);
            background-size: 20px 10px;
            background-repeat: repeat-x;
        }

        .modal.active .message-paper {
            transform: translateY(0) rotate(0);
        }

        .message-text {
            font-size: 16px;
            color: #222;
            line-height: 1.8;
            text-align: center;
        }

        .close-btn {
            display: block;
            margin: 30px auto 0;
            padding: 10px 25px;
            background: #2a2a2a;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background: #444;
        }
        
        .swipe-hint {
            text-align: center;
            font-size: 12px;
            color: #888;
            padding: 10px;
            background: #fdfcf8;
            display: block;
        }
    </style>
</head>
<body>

    <div class="paper-container">
        <div class="header-content">
            <h1>รางวัลสำหรับคนเก่ง ssucommu</h1>
            <p>เหนื่อยมามากแล้วใช่ไหม? ด้านล่างนี้คือข้อความแห่งความปรารถนาดีที่เตรียมไว้ให้คุณโดยเฉพาะ</p>
            <p>เลือกดึงไปได้เลย 1 ใบ แล้วรับพลังบวกนี้ไปใช้สำหรับวันนี้นะ (กระดาษที่ถูกดึงไปแล้วจะหายไปเลย)</p>
        </div>
        <div class="swipe-hint">← เลื่อนซ้าย-ขวา เพื่อเลือกกระดาษ →</div>
        <div class="tear-off-area" id="tearOffArea">
            </div>
    </div>

    <div class="modal" id="messageModal">
        <div class="message-paper">
            <div class="message-text" id="messageText">
                ข้อความจะแสดงที่นี่
            </div>
            <button class="close-btn" onclick="closeModal()">เก็บไว้ในใจแล้วไปต่อ</button>
        </div>
    </div>

    <script>
        // ข้อความให้กำลังใจแบบยาวและลึกซึ้ง 100 ข้อความไม่ซ้ำ
        const messages = [

            "บางครั้งการก้าวเดินช้าๆ ก็ไม่ได้หมายความว่าเราถอยหลัง การได้หยุดพักหายใจและทบทวนตัวเองคือการชาร์จพลังเพื่อก้าวต่อไปอย่างมั่นคง คุณทำดีที่สุดแล้วในจังหวะของตัวเอง",
            "รอยยิ้มของคุณมีค่ามากนะ แม้ในวันที่รู้สึกเหนื่อยล้า ลองมองกระจกแล้วยิ้มให้ตัวเองดู คุณคือคนเก่งที่รับมือกับความท้าทายได้เสมอ อย่าลืมชื่นชมตัวเองบ่อยๆ ล่ะ",
            "ไม่เป็นไรเลยถ้าวันนี้จะมีเรื่องให้ผิดหวัง ทุกความผิดพลาดคือบทเรียนที่ทำให้เราเติบโตและเข้าใจชีวิตมากขึ้น คุณในวันนี้เก่งกว่าคุณในเมื่อวานเสมอ เชื่อมั่นในตัวเองนะ",
            "ความพยายามที่คุณทุ่มเทลงไป ไม่มีวันสูญเปล่าหรอก มันกำลังก่อตัวเป็นรากฐานที่แข็งแกร่งสำหรับอนาคตของคุณ อดทนอีกนิดนะ สิ่งดีๆ กำลังรอคุณอยู่ที่ปลายทาง",
            "อนุญาตให้ตัวเองอ่อนแอบ้างก็ได้นะ ร้องไห้บ้างก็ไม่เป็นไร น้ำตาไม่ได้แปลว่าคุณพ่ายแพ้ แต่มันคือการระบายความรู้สึกเพื่อให้หัวใจได้กลับมาเข้มแข็งอีกครั้ง",
            "คุณไม่จำเป็นต้องสมบูรณ์แบบเพื่อที่จะมีคุณค่า คุณค่าของคุณมีอยู่แล้วในความพยายาม ความตั้งใจ และความเป็นตัวคุณที่เป็นเอกลักษณ์ ภูมิใจในสิ่งที่คุณเป็นนะ",
            "เมื่อไหร่ที่รู้สึกว่าแบกรับทุกอย่างไม่ไหว ลองวางมันลงบ้างก็ได้นะ โลกใบนี้ไม่ได้ต้องการให้คุณแบกมันไว้คนเดียว ให้โอกาสตัวเองได้พักผ่อนและผ่อนคลายบ้าง",
            "ความสำเร็จไม่ได้วัดกันที่ว่าใครไปถึงเส้นชัยก่อน แต่อยู่ที่ว่าระหว่างทางเราได้เรียนรู้อะไรบ้าง จงมีความสุขกับก้าวเล็กๆ ในทุกๆ วันของคุณนะ คนเก่ง",

            "ท้องฟ้าไม่ได้สดใสทุกวัน ชีวิตคนเราก็เหมือนกัน มีวันที่ฝนตกหนัก มีวันที่แดดออก ขอแค่อย่าลืมว่าหลังพายุผ่านพ้นไป ท้องฟ้าจะกลับมางดงามเสมอ",

            "ถ้าวันนี้มันเหนื่อยนัก ก็แค่บอกตัวเองว่า 'พรุ่งนี้เอาใหม่' ชีวิตเรามีวันพรุ่งนี้ให้เริ่มต้นใหม่เสมอ อย่าเพิ่งยอมแพ้กับสิ่งที่ตั้งใจไว้นะ",

            "ความฝันของคุณมีค่าเสมอ แม้ตอนนี้มันอาจจะดูห่างไกล แต่ทุกก้าวที่คุณเดินกำลังพาคุณเข้าใกล้ความจริงมากขึ้นเรื่อยๆ อย่าหยุดฝันและอย่าหยุดลงมือทำนะ",
            "อย่าปล่อยให้คำพูดของคนอื่นมาลดทอนคุณค่าในตัวคุณ คุณรู้จักตัวเองดีที่สุดว่าคุณผ่านอะไรมาบ้าง จงเชื่อมั่นในเสียงหัวใจและวิจารณญาณของตัวเอง",
            "การเริ่มต้นใหม่ไม่ใช่เรื่องน่ากลัว มันคือโอกาสให้เราได้เขียนเรื่องราวบทใหม่ที่สวยงามกว่าเดิม อย่ากลัวที่จะเปิดประตูบานใหม่ในชีวิตนะ",

            "ทุกวันคือของขวัญล้ำค่าที่คุณได้รับ จงใช้มันอย่างคุ้มค่า ทำในสิ่งที่รัก ใช้เวลากับคนที่รัก และสร้างสรรค์ชีวิตที่มีความหมายในแบบของคุณเองนะ",

        ];

        const tearOffArea = document.getElementById('tearOffArea');
        const modal = document.getElementById('messageModal');
        const messageText = document.getElementById('messageText');

        // ฟังก์ชันสำหรับเช็คสถานะการดึงจาก LocalStorage (จำลองว่าถ้าใครดึงไปแล้วในเครื่องนี้จะหายไปเลย)
        // หากต้องการให้หายไปแบบสาธารณะ ต้องเก็บข้อมูลอาเรย์ของ index ที่ถูกดึงไว้ใน Database เช่น Firebase
        function getTornTabs() {
            const torn = localStorage.getItem('tornTabs');
            return torn ? JSON.parse(torn) : [];
        }

        function saveTornTab(index) {
            const torn = getTornTabs();
            if (!torn.includes(index)) {
                torn.push(index);
                localStorage.setItem('tornTabs', JSON.stringify(torn));
            }
        }

        // สร้างกระดาษ 100 ใบ
        function createTabs() {
            const tornTabs = getTornTabs();
            
            for (let i = 0; i < 100; i++) {
                const tab = document.createElement('div');
                tab.className = 'tear-tab';
                // ถ้าในประวัติเคยดึงไปแล้ว ให้ใส่ class torn เพื่อซ่อนไปเลย
                if (tornTabs.includes(i)) {
                    tab.classList.add('torn');
                }
                
                // เขียนคำว่า "ดึงข้อความ" บนกระดาษ
                const text = document.createElement('span');
                text.innerText = "ดึงเพื่ออ่าน";
                
                tab.appendChild(text);

                // เมื่อถูกคลิก (ดึง)
                tab.addEventListener('click', function() {
                    if (this.classList.contains('tearing') || this.classList.contains('torn')) return;

                    // 1. ใส่แอนิเมชันขาด
                    this.classList.add('tearing');
                    
                    // 2. แสดง Modal ข้อความหลังแอนิเมชันขาดเล่นเสร็จ (0.3 วินาที)
                    setTimeout(() => {
                        this.classList.add('torn'); // ทำให้หายไปจากเว็บ
                        saveTornTab(i); // บันทึกว่าใบนี้ถูกดึงแล้ว
                        
                        messageText.innerText = messages[i];
                        modal.classList.add('active');
                    }, 300);
                });

                tearOffArea.appendChild(tab);
            }
        }

        // ปิด Modal
        function closeModal() {
            modal.classList.remove('active');
        }

        // เริ่มต้นสร้างหน้าเว็บ
        createTabs();
    </script>
</body>

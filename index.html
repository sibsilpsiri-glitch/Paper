<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รางวัลสำหรับคนเก่ง ssucommu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #2a2a2a; /* พื้นหลังสีเทาเข้ม */
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
            background-image: radial-gradient(#333 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .container {
            width: 100%;
            max-width: 480px; /* ขนาดพอดีกับมือถือ */
            padding: 20px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .flyer-main {
            background-color: #fdfdfd;
            width: 95%;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            z-index: 2;
            /* ทำให้ขอบกระดาษดูไม่เนี้ยบเกินไป สมจริงขึ้น */
            border-radius: 2px 2px 0 0;
            background-image: linear-gradient(to right, #fdfdfd, #f4f4f4, #fdfdfd);
        }

        .flyer-main::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 5px;
            background: linear-gradient(to right, transparent 50%, #e0e0e0 50%);
            background-size: 10px 100%;
            z-index: 10;
        }

        .title {
            font-size: 24px;
            font-weight: 600;
            color: #222;
            margin-bottom: 20px;
            letter-spacing: 1px;
            line-height: 1.4;
        }

        .subtitle {
            font-size: 14px;
            font-weight: 300;
            color: #555;
            margin-bottom: 10px;
            line-height: 1.6;
        }

        /* ส่วนของรอยฉีกที่เลื่อนแนวนอนได้ */
        .tabs-wrapper {
            width: 95%;
            overflow-x: auto;
            overflow-y: visible;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none; /* ซ่อน scrollbar Firefox */
            box-shadow: 0 20px 20px -10px rgba(0,0,0,0.5);
            margin-bottom: 40px;
        }

        .tabs-wrapper::-webkit-scrollbar {
            display: none; /* ซ่อน scrollbar Chrome/Safari */
        }

        .tabs-container {
            display: inline-flex;
            flex-wrap: nowrap;
            padding-bottom: 20px; /* พื้นที่สำหรับแอนิเมชัน */
        }

        .tab {
            width: 45px;
            height: 150px;
            background-color: #fdfdfd;
            border-right: 1px dashed #bbb;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 12px;
            color: #444;
            transform-origin: top;
            position: relative;
            box-shadow: inset -2px -2px 5px rgba(0,0,0,0.02);
            transition: background-color 0.2s;
        }

        .tab:nth-child(even) {
            height: 145px; /* ทำให้ชายกระดาษดูไม่เท่ากัน สมจริง */
            background-color: #fafafa;
        }

        .tab:last-child {
            border-right: none;
        }

        .tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: radial-gradient(circle, transparent 2px, #fdfdfd 2px);
            background-size: 6px 6px;
            background-position: top center;
        }

        /* แอนิเมชันตอนดึงกระดาษ (Tear & Flip) */
        .tab.tearing {
            animation: tearOff 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none; /* ป้องกันการกดซ้ำ */
            z-index: 10;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        @keyframes tearOff {
            0% { transform: rotateX(0deg) translateY(0) rotateZ(0deg); opacity: 1; }
            40% { transform: rotateX(60deg) translateY(30px) rotateZ(5deg); opacity: 0.9; }
            100% { transform: rotateX(180deg) translateY(150px) rotateZ(15deg); opacity: 0; }
        }

        /* Modal สำหรับอ่านข้อความ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            padding: 30px 25px;
            border-radius: 4px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transform: translateY(30px) rotateX(20deg);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background-image: url('data:image/svg+xml;utf8,<svg width="100" height="100" xmlns="http://www.w3.org/2000/svg"><rect width="100" height="100" fill="none"/><line x1="0" y1="20" x2="100" y2="20" stroke="%23f0f0f0" stroke-width="1"/></svg>'); /* ลายเส้นบรรทัดจางๆ */
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0) rotateX(0);
        }

        .modal-text {
            font-size: 15px;
            font-weight: 300;
            color: #333;
            line-height: 1.8;
            margin-bottom: 25px;
            text-indent: 20px;
        }

        .close-btn {
            background-color: #222;
            color: #fff;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            font-family: 'Prompt', sans-serif;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            transition: background 0.3s;
        }

        .close-btn:hover {
            background-color: #444;
        }

        .instruction {
            color: #999;
            font-size: 12px;
            margin-top: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="flyer-main">
            <div class="title">รางวัลสำหรับคนเก่ง<br>ssucommu</div>
            <div class="subtitle">คุณคือคนเก่งที่ผ่านเรื่องราวมากมายมาได้ในวันนี้ ลองดึงกระดาษด้านล่างนี้สิ เรามีบางอย่างอยากจะบอกคุณ...</div>
            <div class="instruction"> เลื่อนซ้ายขวาเพื่อเลือกกระดาษที่ถูกใจ แล้วแตะเพื่อดึง </div>
        </div>

        <div class="tabs-wrapper">
            <div class="tabs-container" id="tabs-container">
                </div>
        </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="modal-text" id="modal-text"></div>
            <button class="close-btn" onclick="closeModal()">เก็บข้อความนี้ไว้ในใจ แล้วไปต่อ</button>
        </div>
    </div>

    <script>
        // ชุดข้อความให้กำลังใจขนาดยาว ลึกซึ้ง (20 ข้อความที่จะถูกสุ่มให้ครบ 100 ใบ)
        const messagesPool = [
            "บางครั้งการเติบโตไม่ได้หมายถึงการวิ่งให้เร็วที่สุดเสมอไป แต่คือการที่คุณยังคงก้าวเดินต่อไปแม้ในวันที่คุณรู้สึกเหนื่อยล้าที่สุด การที่คุณตื่นขึ้นมาเผชิญหน้ากับความจริงในวันนี้ นั่นก็เพียงพอแล้วที่จะเรียกตัวเองว่า 'คนเก่ง' ขอให้ภูมิใจในบาดแผลที่คุณมี เพราะมันคือหลักฐานของความพยายามที่ไม่เคยยอมแพ้",
            "บนโลกใบนี้ไม่มีใครสมบูรณ์แบบ และคุณก็ไม่จำเป็นต้องแบกรับทุกอย่างเอาไว้คนเดียว การร้องไห้ไม่ใช่สัญลักษณ์ของความอ่อนแอ แต่คือการระบายความรู้สึกเพื่อให้หัวใจได้มีพื้นที่ว่างสำหรับความสุขใหม่ๆ ที่กำลังจะเข้ามา จงใจดีกับตัวเองให้มากๆ เพราะคุณคู่ควรกับความรักจากตัวคุณเองเสมอ",
            "จำไว้ว่าดวงดาวจะส่องประกายได้งดงามที่สุดในคืนที่มืดมิด ปัญหาและอุปสรรคที่คุณกำลังเจอในตอนนี้ อาจเป็นเพียงฉากหลังที่ถูกสร้างขึ้นมาเพื่อให้ความสำเร็จของคุณในวันข้างหน้าดูงดงามและมีคุณค่ามากยิ่งขึ้น ค่อยๆ แก้ไปทีละปม ไม่ต้องรีบ คุณทำได้ดีมากแล้วจริงๆ",
            "การเริ่มต้นใหม่ไม่เคยน่ากลัวเท่ากับการติดอยู่ในที่เดิมโดยไม่พยายามทำอะไรเลย ทุกครั้งที่คุณตัดสินใจก้าวออกจากเซฟโซน คุณได้เติบโตขึ้นไปอีกขั้นแล้ว ไม่ว่าผลลัพธ์จะออกมาเป็นอย่างไร ประสบการณ์ที่คุณได้รับจะกลายเป็นเกราะป้องกันที่ทำให้คุณแข็งแกร่งขึ้นในอนาคต",
            "ในวันที่ฝนตกหนัก อย่าลืมว่าเหนือหมู่เมฆเหล่านั้นยังมีดวงอาทิตย์ที่รอคอยจะส่องแสงเสมอ ความเศร้าและความผิดหวังเป็นเพียงฤดูกาลหนึ่งของชีวิต มันแวะมาทักทายเพื่อให้เราเรียนรู้และเห็นคุณค่าของความสุข รักษาสุขภาพใจของตัวเองให้ดี วันพรุ่งนี้ยังมีเรื่องราวดีๆ รอคุณอยู่",
            "ไม่ว่าใครจะมองคุณอย่างไร สิ่งสำคัญที่สุดคือคุณมองตัวเองอย่างไร อย่าลดทอนคุณค่าของตัวเองเพียงเพราะคำพูดของคนที่ไม่รู้จักคุณดีพอ คุณคือผลงานศิลปะที่มีชิ้นเดียวในโลก มีเอกลักษณ์ มีความงดงามในแบบของตัวเอง จงเปล่งประกายในแบบที่คุณเป็น",
            "ความสำเร็จไม่ได้วัดกันที่ว่าใครไปถึงเส้นชัยก่อน แต่อยู่ที่ว่าระหว่างทางคุณได้เรียนรู้อะไรบ้าง บางครั้งการหยุดพักเพื่อชมวิวข้างทาง หรือแม้แต่การหลงทาง ก็อาจทำให้คุณค้นพบสิ่งสวยงามที่คุณอาจพลาดไปหากมัวแต่วิ่งอย่างเดียว อนุญาตให้ตัวเองได้พักบ้างนะ",
            "ทุกความพยายาม ไม่ว่าจะเล็กน้อยแค่ไหน ล้วนมีความหมายเสมอ การสะสมความสำเร็จเล็กๆ น้อยๆ ในแต่ละวัน คือรากฐานที่มั่นคงของความสำเร็จที่ยิ่งใหญ่ อย่าดูถูกก้าวเล็กๆ ของตัวเอง เพราะก้าวเล็กๆ นี่แหละที่พาคนเดินขึ้นภูเขาที่สูงที่สุดมาแล้วนักต่อนัก",
            "หากวันนี้มันหนักหนาเกินไป ลองวางมันลงก่อน หายใจเข้าลึกๆ แล้วบอกตัวเองว่า 'แค่นี้ก็เก่งมากแล้ว' เราทุกคนต่างมีข้อจำกัด และการยอมรับข้อจำกัดนั้นคือจุดเริ่มต้นของการเรียนรู้ที่จะก้าวข้ามมันไป พรุ่งนี้คือวันใหม่ คือโอกาสใหม่ที่คุณจะได้เริ่มต้นอีกครั้ง",
            "รอยยิ้มของคุณคือเวทมนตร์ที่สามารถเปลี่ยนวันธรรมดาๆ ให้กลายเป็นวันที่แสนพิเศษได้ ไม่ใช่แค่กับตัวคุณเอง แต่รวมถึงคนรอบข้างด้วย แม้ในวันที่โลกใจร้ายกับคุณ ขอให้คุณอย่าลืมที่จะยิ้มให้กับตัวเองในกระจก เพราะคุณคือคนสำคัญที่สุดที่ต้องดูแล",
            "ความกลัวเป็นเพียงภาพลวงตาที่เราสร้างขึ้นมาเอง เมื่อใดที่คุณกล้าเผชิญหน้ากับมัน คุณจะพบว่ามันไม่ได้น่ากลัวอย่างที่คิด ความกล้าหาญไม่ใช่การไม่มีความกลัว แต่คือการลงมือทำทั้งๆ ที่ยังกลัวอยู่ ขอให้คุณมีความกล้าหาญที่จะทำตามความฝันของตัวเอง",
            "อดีตคือบทเรียน อนาคตคือความหวัง แต่ปัจจุบันคือของขวัญล้ำค่าที่คุณสามารถสร้างสรรค์ได้ด้วยมือของคุณเอง อย่าปล่อยให้ความผิดพลาดในอดีตมาบดบังความสวยงามของปัจจุบัน ทำวันนี้ให้ดีที่สุด แล้ววันพรุ่งนี้จะดูแลตัวมันเอง",
            "คุณไม่จำเป็นต้องเก่งที่สุดเพื่อที่จะได้รับการยอมรับ คุณแค่ต้องเป็นตัวของตัวเองและพยายามทำในสิ่งที่รักอย่างเต็มที่ คนที่รักและหวังดีกับคุณอย่างแท้จริง เขาจะมองเห็นคุณค่าในตัวคุณเสมอ ไม่ว่าคุณจะอยู่ในจุดไหนของชีวิตก็ตาม",
            "การเปรียบเทียบตัวเองกับคนอื่นคือโจรที่ขโมยความสุขไปจากชีวิต ทุกคนมีเส้นเวลาและจังหวะชีวิตของตัวเอง ต้นไม้แต่ละต้นยังเบ่งบานในฤดูกาลที่แตกต่างกัน คุณเองก็เช่นกัน จงเติบโตและเบ่งบานในเวลาที่เหมาะสมของคุณเอง",
            "ในวันที่คุณรู้สึกว่าไม่มีใครเข้าใจ ขอให้รู้ไว้ว่ายังมีตัวคุณเองที่ผ่านเรื่องราวทั้งหมดมาด้วยกัน โอบกอดตัวเองให้แน่นๆ ขอบคุณตัวเองที่ไม่เคยยอมแพ้ ความเข้มแข็งที่คุณสร้างขึ้นจากภายใน จะเป็นเกราะกำบังที่ไม่มีวันถูกทำลาย",
            "บางครั้งการปล่อยวางก็ยากกว่าการยึดติด แต่เมื่อคุณกล้าที่จะปล่อยมือจากสิ่งที่ไม่ใช่ คุณก็จะเปิดโอกาสให้สิ่งที่ดีกว่าเข้ามาในชีวิต ความเจ็บปวดจากการสูญเสียคือราคาที่เราต้องจ่ายเพื่อแลกกับการเริ่มต้นใหม่ที่สดใสกว่าเดิม",
            "หากเปรียบชีวิตเป็นหนังสือ ตอนนี้อาจจะเป็นเพียงบทที่ท้าทายบทหนึ่งเท่านั้น อย่าเพิ่งรีบปิดหนังสือลง เพียงเพราะเจอบรรทัดที่อ่านยาก เปิดหน้าต่อไปเรื่อยๆ แล้วคุณจะพบว่าเรื่องราวของคุณยังมีจุดหักมุมที่สวยงามรออยู่",
            "ความรักที่คุณมอบให้กับคนอื่น อย่าลืมเก็บไว้เผื่อตัวเองด้วยนะ การดูแลตัวเองไม่ใช่ความเห็นแก่ตัว แต่คือการเตรียมความพร้อมเพื่อที่จะสามารถแบ่งปันสิ่งดีๆ ให้กับโลกใบนี้ได้อย่างยั่งยืน คุณต้องแข็งแรงก่อน ถึงจะดูแลคนที่คุณรักได้",
            "ไม่มีความสำเร็จใดได้มาโดยปราศจากอุปสรรค รอยแผลเป็นจากการล้มลุกคลุกคลานคือเครื่องหมายแห่งเกียรติยศที่พิสูจน์ว่าคุณได้ลงสนามจริง ไม่ได้เป็นเพียงผู้ชม ขอให้นำบทเรียนเหล่านั้นมาเป็นพลังผลักดันให้คุณก้าวต่อไปอย่างมั่นคง",
            "จำไว้เสมอว่า คุณคือสิ่งมหัศจรรย์ของจักรวาล โอกาสที่คุณจะได้เกิดมามีชีวิตและสัมผัสความรู้สึกต่างๆ นั้นมีน้อยมาก จงใช้ชีวิตให้คุ้มค่า ทำในสิ่งที่รัก รักในสิ่งที่ทำ และอย่าลืมว่าคุณมีความสามารถที่จะสร้างการเปลี่ยนแปลงที่ดีให้กับโลกใบนี้ได้"
        ];

        const tabsContainer = document.getElementById('tabs-container');
        const totalTabs = 100;
        
        // สร้าง Array 100 ข้อความจากการสุ่มข้อความใน Pool
        let messages = [];
        for (let i = 0; i < totalTabs; i++) {
            // เลือกข้อความแบบสุ่มจาก 20 ข้อความ
            const randomIndex = Math.floor(Math.random() * messagesPool.length);
            messages.push(messagesPool[randomIndex]);
        }

        // ฟังก์ชันสร้างกระดาษฉีก 100 ใบ
        function createTabs() {
            for (let i = 0; i < totalTabs; i++) {
                const tab = document.createElement('div');
                tab.className = 'tab';
                tab.innerHTML = 'ดึงฉันสิ...'; // ข้อความบนรอยฉีก
                
                // กำหนด Event เมื่อกดดึงกระดาษ
                tab.onclick = function() {
                    pullTab(this, messages[i]);
                };
                
                tabsContainer.appendChild(tab);
            }
        }

        // ฟังก์ชันเมื่อกระดาษถูกดึง
        function pullTab(element, text) {
            // ป้องกันการดึงซ้ำ
            if(element.classList.contains('tearing')) return;

            // 1. เพิ่ม Class เพื่อเล่น Animation 3D หมุนและหลุดออก
            element.classList.add('tearing');
            
            // 2. รอให้ Animation เกือบจบ (ประมาณ 600ms) แล้วแสดงข้อความ
            setTimeout(() => {
                showModal(text);
                
                // 3. หลังจากแสดงข้อความแล้ว ให้ลบกระดาษใบนั้นทิ้งจากหน้าเว็บ (เหมือนถูกเด็ดไปแล้วเอากลับมาไม่ได้)
                setTimeout(() => {
                    element.remove();
                }, 200); // เผื่อเวลาให้แอนิเมชันซ่อนตัวเสร็จสมบูรณ์

            }, 600); 
        }

        // ฟังก์ชันแสดง Popup ข้อความ
        const modal = document.getElementById('modal');
        const modalText = document.getElementById('modal-text');

        function showModal(text) {
            modalText.innerText = text;
            modal.classList.add('active');
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // เริ่มต้นการสร้างกระดาษเมื่อโหลดหน้าเว็บเสร็จ
        window.onload = createTabs;
    </script>
</body>
</html>

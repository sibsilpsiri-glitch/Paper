    <style>
        :root {
            --bg-color: #2a2a2a;
            --paper-color: #fdfdfd;
            --text-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(#3a3a3a 1px, transparent 1px);
            background-size: 20px 20px;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 15px;
            overflow-x: hidden;
        }

        /* Paper Container */
        .poster {
            background-color: var(--paper-color);
            width: 100%;
            max-width: 450px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4), inset 0 0 40px rgba(0,0,0,0.03);
            position: relative;
            display: flex;
            flex-direction: column;
            border-radius: 2px;
        }

        /* Top Section */
        .poster-header {
            padding: 40px 20px;
            text-align: center;
            border-bottom: 2px dashed #ccc;
            position: relative;
        }

        .poster-header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
            margin-bottom: 15px;
            line-height: 1.4;
            color: #111;
        }

        .poster-header p {
            font-size: 14px;
            color: #555;
            line-height: 1.6;
        }

        /* Grid for 100 Tabs */
        .tabs-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 5 columns fit nicely on mobile */
            gap: 0;
            padding: 0;
            background: #fff;
            position: relative;
        }

        /* Individual Tear-off Tab */
        .tab {
            position: relative;
            height: 80px;
            border-right: 1px dashed #ddd;
            border-bottom: 1px dashed #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: linear-gradient(to bottom, #ffffff 0%, #f9f9f9 100%);
            transition: background 0.3s;
            transform-origin: top center;
            transform-style: preserve-3d;
        }

        .tab:nth-child(5n) {
            border-right: none;
        }

        .tab:active {
            background: #f0f0f0;
        }

        .tab-number {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 12px;
            color: #888;
            letter-spacing: 2px;
        }

        /* Torn Animation Class */
        .tab.tearing {
            animation: tearOff 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            pointer-events: none;
            z-index: 10;
        }

        /* Already Torn Class (Empty Space) */
        .tab.torn-away {
            visibility: hidden;
            pointer-events: none;
        }

        @keyframes tearOff {
            0% { transform: rotateX(0deg) translateY(0) rotateZ(0deg); opacity: 1; }
            40% { transform: rotateX(60deg) translateY(20px) rotateZ(5deg); opacity: 0.8; }
            100% { transform: rotateX(180deg) translateY(150px) rotateZ(-10deg); opacity: 0; }
        }

        /* Modal Overlay for Message */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            backdrop-filter: blur(4px);
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .message-paper {
            background: #fdfdfd;
            width: 85%;
            max-width: 350px;
            padding: 40px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transform: scale(0.8) rotateY(-90deg);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            background-image: linear-gradient(#eee 1px, transparent 1px);
            background-size: 100% 30px;
            line-height: 30px;
        }

        .modal-overlay.active .message-paper {
            transform: scale(1) rotateY(0deg);
        }

        .message-text {
            font-size: 16px;
            color: #333;
            text-align: center;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 10px;
        }

        .close-btn {
            position: absolute;
            top: 10px;
            right: 15px;
            font-size: 24px;
            color: #999;
            cursor: pointer;
            line-height: 1;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: var(--bg-color);
            font-size: 14px;
        }
    </style>
</head>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รางวัลสำหรับคนเก่ง ssucommu</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2c2c2c;
            --paper-color: #fdfdfd;
            --text-color: #333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Prompt', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        /* Container หลัก จัดให้อยู่ตรงกลางและพอดีกับจอมือถือ */
        .board-container {
            width: 100%;
            max-width: 480px; /* ขนาดมือถือมาตรฐาน */
            margin-top: 40px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ส่วนหัวกระดาษแผ่นใหญ่ */
        .main-paper {
            background: var(--paper-color);
            padding: 40px 20px;
            text-align: center;
            border-radius: 2px 2px 0 0;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            position: relative;
            background-image: 
                linear-gradient(90deg, transparent 95%, rgba(0,0,0,0.02) 100%),
                linear-gradient(rgba(0,0,0,0.02) 1px, transparent 1px);
            background-size: 100% 20px;
            z-index: 10;
        }

        .main-paper::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 100%;
            height: 10px;
            background: var(--paper-color);
            clip-path: polygon(0 0, 5% 100%, 10% 0, 15% 100%, 20% 0, 25% 100%, 30% 0, 35% 100%, 40% 0, 45% 100%, 50% 0, 55% 100%, 60% 0, 65% 100%, 70% 0, 75% 100%, 80% 0, 85% 100%, 90% 0, 95% 100%, 100% 0);
            z-index: 11;
        }

        .main-paper h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .main-paper p {
            font-size: 0.95rem;
            color: #666;
            font-weight: 300;
        }

        /* ส่วนของรอยฉีกด้านล่าง (แนวนอน เลื่อนได้) */
        .tabs-wrapper {
            width: 100%;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            padding: 0 10px 40px 10px;
            margin-top: -2px; /* ให้แนบสนิทกับกระดาษหลัก */
        }

        /* ซ่อน Scrollbar เพื่อความสวยงาม */
        .tabs-wrapper::-webkit-scrollbar { display: none; }
        .tabs-wrapper { -ms-overflow-style: none; scrollbar-width: none; }

        .tabs-container {
            display: flex;
            gap: 2px;
            padding-top: 5px;
            width: max-content;
        }

        /* ชิ้นกระดาษแต่ละใบ */
        .tab {
            width: 45px;
            height: 120px;
            background: var(--paper-color);
            flex-shrink: 0;
            cursor: pointer;
            position: relative;
            transform-origin: top center;
            box-shadow: 2px 5px 10px rgba(0,0,0,0.3);
            border-left: 1px dashed rgba(0,0,0,0.1);
            border-right: 1px dashed rgba(0,0,0,0.1);
            transition: transform 0.2s, background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .tab:hover {
            background: #f0f0f0;
        }

        .tab span {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 0.75rem;
            color: #888;
            pointer-events: none;
        }

        /* แอนิเมชันตอนฉีก */
        .tab.tearing {
            animation: tearAnimation 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
            pointer-events: none;
        }

        @keyframes tearAnimation {
            0% { transform: rotateX(0) translateY(0); opacity: 1; }
            40% { transform: rotateX(-30deg) translateY(20px) rotateZ(5deg); opacity: 1; }
            100% { transform: rotateX(-90deg) translateY(100px) rotateZ(15deg); opacity: 0; }
        }

        .tab.torn {
            visibility: hidden;
            opacity: 0;
            pointer-events: none;
            height: 0; /* ยุบพื้นที่ทิ้ง */
            width: 0;
            margin: 0;
            border: none;
        }

        /* Modal สำหรับแสดงข้อความที่ถูกดึงออกมา */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            perspective: 1000px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* แอนิเมชันพลิกกระดาษ 3D */
        .message-paper-container {
            width: 90%;
            max-width: 400px;
            height: auto;
            min-height: 300px;
            position: relative;
            transform-style: preserve-3d;
            transform: rotateY(-180deg) scale(0.5);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .message-paper-container {
            transform: rotateY(0deg) scale(1);
        }

        .paper-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: var(--paper-color);
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 30px;
            text-align: center;
        }

        .paper-front {
            /* ด้านหน้าที่เปิดมาเจอข้อความ */
            transform: rotateY(0deg);
        }

        .paper-back {
            /* ด้านหลังกระดาษตอนที่กำลังพลิกมา */
            transform: rotateY(180deg);
            background: #e0e0e0;
        }

        .message-content {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #222;
            font-weight: 400;
        }

        .close-btn {
            margin-top: 30px;
            padding: 12px 25px;
            background: #2c2c2c;
            color: white;
            border: none;
            border-radius: 30px;
            font-family: 'Prompt', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        
        .close-btn:hover { background: #1a1a1a; }

        /* Loader */
        .loader { color: white; margin-top: 20px; font-size: 1.2rem; }
    </style>
</head>

    <div class="board-container">
        <div class="main-paper">

            <p>ดึงกระดาษด้านล่างเพื่อรับกำลังใจของคุณ (ดึงแล้วหายไปเลย)</p>
        </div>
        <div class="tabs-wrapper">
            <div class="tabs-container" id="tabs-container">
                </div>
        </div>
        <div id="loading" class="loader">กำลังเชื่อมต่อฐานข้อมูล...</div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="message-paper-container">
            <div class="paper-face paper-back"></div>
            <div class="paper-face paper-front">
                <div class="message-content" id="message-text"></div>
                <button class="close-btn" onclick="closeModal()">เก็บความรู้สึกนี้ไว้</button>

            "ถ้าคุณกำลังรู้สึกแย่ ให้รู้ไว้ว่ามีคนอีกมากมายบนโลกนี้ที่กำลังเผชิญปัญหาเดียวกับคุณ คุณไม่ได้อยู่คนเดียวนะ",
            "ความสำเร็จไม่ได้เกิดขึ้นเพียงชั่วข้ามคืน แต่มันเกิดจากความพยายามอย่างสม่ำเสมอ อดทนและทำต่อไปนะ",
            "การเป็นคนดีเป็นเรื่องง่ายกว่าการเป็นคนเก่ง จงเลือกที่จะเป็นคนดีก่อน แล้วความเก่งจะตามมาเอง",
            "ชีวิตเปรียบเสมือนหนังสือที่คุณสามารถเขียนตอนจบของตัวเองได้ จงเขียนเรื่องราวชีวิตของคุณให้ดีที่สุด",
            "ทุกการเปลี่ยนแปลงเริ่มต้นจากการลงมือทำ ถ้าคุณอยากเห็นการเปลี่ยนแปลง ก็ต้องเริ่มลงมือทำตั้งแต่วันนี้",
            "อย่ากลัวที่จะแตกต่าง ความแตกต่างคือสิ่งทำให้โลกนี้น่าสนใจ จงภูมิใจในความเป็นตัวของตัวเอง",
            "ความทรงจำดีๆ คือสมบัติที่มีค่าที่สุดในชีวิต สร้างความทรงจำดีๆ ให้มากๆ นะ",
            "ถ้าคุณรู้สึกหมดไฟ ลองไปหาแรงบันดาลใจจากธรรมชาติหรือศิลปะดูสิ มันอาจจะช่วยจุดไฟในตัวคุณให้ลุกโชนขึ้นมาอีกครั้ง",
            "ขอบคุณตัวเองที่เข้มแข็งและผ่านเรื่องราวต่างๆ มาได้จนถึงวันนี้ คุณคือคนเก่งและแกร่งที่สุดในโลกใบนี้เลยนะ"
        ];

        // เติมข้อความให้ครบ 100 ข้อความเป๊ะๆ เพื่อป้องกัน Array Out of Bound
        while(encouragements.length < 100) {
            encouragements.push(`ความพยายามเล็กๆ ของคุณในวันนี้ คือก้าวที่ยิ่งใหญ่ในวันพรุ่งนี้ คนเก่งอย่างคุณทำได้อยู่แล้วนะ สู้ๆ! (ข้อความใบที่ ${encouragements.length + 1})`);
        }

        const tabsContainer = document.getElementById('tabs-container');
        const loadingElement = document.getElementById('loading');
        let isTabTorn = {}; // สถานะจาก Firebase

        // 2. ดึงข้อมูลจาก Firebase ครั้งแรกและรอรับการอัปเดตแบบ Realtime
        onValue(dbRef, (snapshot) => {
            loadingElement.style.display = 'none';
            const data = snapshot.val() || {};
            isTabTorn = data;
            renderTabs();
        }, (error) => {
            console.error("Firebase Error:", error);
            loadingElement.innerHTML = "ไม่สามารถเชื่อมต่อฐานข้อมูลได้ แต่คุณยังสามารถลองดึงกระดาษดูได้";
            renderTabs(); // Render แบบ Offline ถ้าพัง
        });

        // 3. ฟังก์ชันสร้างชิ้นกระดาษ 100 ใบ
        function renderTabs() {
            tabsContainer.innerHTML = '';
            for (let i = 0; i < 100; i++) {
                const tab = document.createElement('div');
                tab.className = 'tab';
                
                // ถ้าใน Firebase บอกว่าโดนดึงไปแล้ว (true) ให้ซ่อนใบนี้ถาวร
                if (isTabTorn[i] === true) {
                    tab.classList.add('torn');
                }

                // ข้อความบนแถบกระดาษ
                const span = document.createElement('span');
                span.innerText = "ดึงเพื่อรับกำลังใจ";
                tab.appendChild(span);

                // เมื่อคลิกที่กระดาษ
                tab.onclick = () => tearTab(i, tab);
                
                tabsContainer.appendChild(tab);
            }
        }

        // 4. แอนิเมชันตอนฉีกกระดาษ
        window.tearTab = function(index, element) {
            if (isTabTorn[index]) return; // ถ้าดึงไปแล้ว ทำอะไรไม่ได้
            
            // 4.1 ทำให้ขาด
            element.classList.add('tearing');
            
            // 4.2 อัปเดตไปยัง Firebase เพื่อให้คนอื่นเห็นว่าใบนี้หายไปแล้ว
            isTabTorn[index] = true;
            const updates = {};
            updates[index] = true;
            update(dbRef, updates).catch(err => console.log("Offline mode, not saving to DB"));

            // 4.3 รอให้แอนิเมชันฉีกเสร็จแล้วโชว์ข้อความ
            setTimeout(() => {
                showModal(encouragements[index]);
            }, 800);
        };

        // 5. การแสดง Modal สวยๆ
        const modal = document.getElementById('modal');
        const messageText = document.getElementById('message-text');

        window.showModal = function(text) {
            messageText.innerText = text;
            modal.classList.add('active');
        };

        window.closeModal = function() {
            modal.classList.remove('active');
            // รีเรนเดอร์อีกรอบเพื่อให้ใบที่เพิ่งดึงหายไปแบบสมบูรณ์จากหน้าจอ
            renderTabs();
        };

    </script>
</body>
</html>

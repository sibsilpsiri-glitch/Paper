<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รางวัลสำหรับคนเก่ง bcucommu</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2b2b2b;
            --paper-color: #fcfcfc;
            --text-color: #333;
            --shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Prompt', sans-serif;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px 10px;
            overflow-x: hidden;
        }

        /* เมนบอร์ดหลัก */
        .board {
            width: 100%;
            max-width: 420px; /* ขนาดพอดีกับหน้าจอมือถือ */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ส่วนหัวกระดาษแผ่นใหญ่ */
        .main-poster {
            background-color: var(--paper-color);
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            box-shadow: var(--shadow);
            position: relative;
            z-index: 10;
            /* ทำให้กระดาษดูมีมิติเหมือนจริง */
            background-image: linear-gradient(120deg, #fdfdfd 0%, #f4f4f4 100%);
            border-bottom: 2px dashed #d1d1d1;
        }

        .main-poster h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 15px;
            line-height: 1.4;
            letter-spacing: 0.5px;
        }

        .main-poster p {
            font-size: 0.95rem;
            font-weight: 300;
            color: #555;
            line-height: 1.6;
        }

        /* คอนเทนเนอร์สำหรับกระดาษ 100 ใบ */
        .tabs-container {
            display: flex;
            flex-wrap: wrap;
            width: 100%;
            background: transparent;
            position: relative;
            top: -2px; /* ดึงให้ชิดรอยปะ */
        }

        /* กระดาษแต่ละใบ */
        .tear-tab {
            width: 25%; /* แบ่งเป็น 4 แถวในมือถือ */
            background-color: var(--paper-color);
            border: 1px solid #e0e0e0;
            border-top: 2px dashed #a0a0a0; /* รอยฉีก */
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background 0.3s, transform 0.2s;
            /* ทำให้ดูเหมือนกระดาษห้อยลงมา */
            background-image: linear-gradient(to bottom, #fcfcfc, #f0f0f0);
            transform-origin: top center;
        }

        .tear-tab:hover {
            background-color: #e8e8e8;
        }

        .tear-tab span {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 0.85rem;
            font-weight: 400;
            color: #666;
            letter-spacing: 1px;
            transform: rotate(180deg); /* ให้ตัวหนังสืออ่านจากบนลงล่าง */
            pointer-events: none;
        }

        /* อนิเมชั่นตอนดึงกระดาษ */
        .tearing {
            animation: tearAnimation 0.8s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
            pointer-events: none;
            z-index: 20;
        }

        @keyframes tearAnimation {
            0% { transform: rotateX(0) translateY(0); opacity: 1; }
            40% { transform: rotateX(40deg) translateY(20px) rotateZ(5deg); opacity: 1; }
            100% { transform: translateY(300px) rotateZ(15deg); opacity: 0; }
        }

        /* Modal สำหรับพลิกอ่านข้อความ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            z-index: 100;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-paper {
            background: var(--paper-color);
            width: 100%;
            max-width: 380px;
            padding: 40px 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            transform: translateY(50px) rotateX(20deg);
            opacity: 0;
            transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.5s;
            position: relative;
            background-image: radial-gradient(#fff, #f4f4f4);
        }

        .modal-overlay.active .modal-paper {
            transform: translateY(0) rotateX(0);
            opacity: 1;
        }

        .modal-text {
            font-size: 1.05rem;
            line-height: 1.8;
            font-weight: 300;
            color: #222;
            text-align: left;
            white-space: pre-line;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            color: #888;
            cursor: pointer;
            transition: color 0.3s;
        }

        .close-btn:hover {
            color: #000;
        }

        /* ซ่อนกระดาษที่ถูกดึงไปแล้วถาวร */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="board">
        <div class="main-poster">
            <h1>รางวัลสำหรับคนเก่ง<br>bcucommu</h1>
            <p>ไม่ว่าวันนี้คุณจะเจอเรื่องหนักหนาแค่ไหน<br>ลองเลือกดึงกระดาษสักใบ เพื่อรับรางวัลเป็นข้อความให้กำลังใจสำหรับคุณโดยเฉพาะนะ</p>
        </div>
        <div class="tabs-container" id="tabsContainer">
            </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-paper">
            <div class="close-btn" id="closeBtn">&times;</div>
            <div class="modal-text" id="modalText"></div>
        </div>
    </div>

    <script>
        // ชุดข้อความเปิด กลาง และปิด เพื่อสร้าง 100 ข้อความที่มีความหมายลึกซึ้งและยาวพอดี
        const openings = [
            "บางครั้งการเติบโตก็มาในรูปแบบของความเหนื่อยล้าที่คุณกำลังเผชิญอยู่ตอนนี้ ",
            "ฉันรู้ว่าช่วงนี้คุณอาจจะรู้สึกว่าทุกอย่างมันหนักหนาและถาโถมเข้ามาเหลือเกิน ",
            "การพยายามทำทุกอย่างให้ดีที่สุดมันใช้พลังงานเยอะมากเลยใช่ไหม ",
            "คุณอาจจะคิดว่าไม่มีใครเห็นความพยายามของคุณในมุมมืดที่ไม่มีแสงส่องถึง ",
            "วันที่ฟ้าหม่นหมองไม่ได้แปลว่าความสดใสจะหายไปตลอดกาล แค่มันถูกซ่อนไว้ชั่วคราวเท่านั้น ",
            "อยากให้คุณลองหยุดพักและสูดหายใจลึกๆ ให้กับความวุ่นวายทั้งหมดที่คุณแบกรับไว้ ",
            "ไม่มีใครเข้มแข็งได้ตลอดเวลา และมันโอเคมากๆ ที่วันนี้คุณจะรู้สึกอ่อนแอบ้าง ",
            "ท่ามกลางความสับสนและกดดัน คุณยังคงก้าวเดินต่อไปได้ นั่นแหละคือสิ่งที่วิเศษที่สุด ",
            "คุณเก่งมากแล้วนะที่ผ่านเรื่องราวต่างๆ มากมายมาจนถึงวินาทีนี้ได้ ",
            "เส้นทางที่คุณเลือกเดินอาจจะไม่ได้โรยด้วยกลีบกุหลาบ แต่มันคือเส้นทางที่สร้างให้คุณแข็งแกร่งขึ้น "
        ];

        const middles = [
            "แต่เชื่อเถอะว่า ทุกหยาดเหงื่อและน้ำตาที่คุณเสียไป มันกำลังรดน้ำต้นไม้แห่งความสำเร็จในใจคุณให้เติบโตอย่างงดงาม ",
            "สิ่งที่คุณทำเพื่อคอมมูนิตี้และคนรอบข้าง มันสร้างรอยยิ้มและพลังบวกให้คนอื่นได้อย่างมหาศาลโดยที่คุณอาจไม่รู้ตัวเลยล่ะ ",
            "ความตั้งใจและความใส่ใจในรายละเอียดของคุณคือพรสวรรค์ที่หาได้ยาก ขอให้ภูมิใจในความเป็นตัวเองให้มากๆ นะ ",
            "เมื่อมองย้อนกลับมา คุณจะพบว่าตัวเองมาไกลแค่ไหนแล้ว อุปสรรคเหล่านี้แหละที่ทำให้เรื่องราวของคุณน่าจดจำ ",
            "โปรดรับรู้ไว้ว่าคุณไม่ได้อยู่ตัวคนเดียว ยังมีคนที่พร้อมจะซัพพอร์ตและมองเห็นความเปล่งประกายในตัวคุณเสมอ ",
            "การล้มไม่ได้หมายความว่าพ่ายแพ้ แต่มันคือโอกาสที่คุณจะได้เรียนรู้วิธีลุกขึ้นยืนให้มั่นคงกว่าเดิมต่างหาก ",
            "อย่ากดดันตัวเองจนลืมใจดีกับตัวเองนะ คุณสมควรได้รับความรักและความอ่อนโยนจากตัวคุณเองมากที่สุด ",
            "บางก้าวอาจจะช้าไปบ้าง บางก้าวอาจจะสะดุด แต่ตราบใดที่คุณยังไม่หยุดเดิน คุณจะไปถึงจุดหมายที่ตั้งไว้แน่นอน ",
            "แพสชันและความมุ่งมั่นของคุณคือแสงสว่างที่คอยนำทาง ไม่ว่าปัญหาจะซับซ้อนแค่ไหน คุณก็จะหาทางออกเจอเสมอ ",
            "คุณค่าในตัวคุณไม่ได้ลดลงเพียงเพราะใครบางคนมองไม่เห็น มันยังคงสว่างไสวอยู่ในตัวคุณ รอวันที่จะเปล่งประกายอย่างเต็มที่ "
        ];

        const endings = [
            "พักผ่อนเยอะๆ ดื่มน้ำอร่อยๆ แล้วพรุ่งนี้มาเริ่มกันใหม่นะ คุณคนเก่งของ bcucommu",
            "ขอให้รอยยิ้มของคุณกลับมาสดใสในเร็ววัน รางวัลนี้คู่ควรกับคนเก่งแบบคุณที่สุดแล้ว",
            "กอดตัวเองแน่นๆ แล้วบอกตัวเองว่า 'ฉันทำได้ดีที่สุดแล้ว' เป็นกำลังใจให้เสมอเลยนะ",
            "พรุ่งนี้จะเป็นวันที่ดีกว่าเดิมแน่นอน ขอให้คืนนี้หลับสนิทและฝันดี ปล่อยวางเรื่องกังวลไปก่อนนะ",
            "จงเชื่อมั่นในตัวเองต่อไปนะ โลกใบนี้ต้องการความอบอุ่นและความสามารถที่คุณมีจริงๆ",
            "อนุญาตให้ตัวเองพักชาร์จแบตบ้างนะ แล้วกลับมาลุยใหม่เมื่อพร้อม คุณทำได้ยอดเยี่ยมเสมอ",
            "ไม่ว่าผลลัพธ์จะออกมาเป็นอย่างไร ขอให้รู้ไว้ว่าความตั้งใจของคุณนั้นสวยงามที่สุดแล้ว สู้ๆ นะ",
            "ขอส่งพลังบวกทั้งหมดนี้ไปโอบกอดคุณไว้นะ ยิ้มกว้างๆ ให้กับหน้ากระจก แล้วไปต่อกันเถอะ",
            "จงภูมิใจในบาดแผลและการเติบโตของตัวเอง คุณคือนักสู้ที่เก่งกาจและน่านับถือที่สุดเลย",
            "จำไว้เสมอว่าคุณคือคนสำคัญ และทุกสิ่งที่คุณสร้างสรรค์ขึ้นมามันมีคุณค่ามากๆ เป็นกำลังใจให้นะ!"
        ];

        // ฟังก์ชันสร้าง 100 ข้อความ
        const generateMessages = () => {
            const messages = [];
            let counter = 0;
            // ใช้ลูปซ้อนกันเพื่อสุ่มเลือกประโยค 100 แบบไม่ซ้ำ
            for(let i = 0; i < 10; i++) {
                for(let j = 0; j < 10; j++) {
                    const opening = openings[(i + j) % 10];
                    const middle = middles[(i * 2 + j) % 10];
                    const ending = endings[(i + j * 2) % 10];
                    messages.push(opening + middle + ending);
                    counter++;
                    if(counter === 100) break;
                }
                if(counter === 100) break;
            }
            // สลับตำแหน่งข้อความใน Array ให้ดูเป็นธรรมชาติ
            return messages.sort(() => Math.random() - 0.5);
        };

        const allMessages = generateMessages();
        
        // ดึงข้อมูลการดึงกระดาษจาก LocalStorage
        const getTornTabs = () => {
            return JSON.parse(localStorage.getItem('bcucommu_torn_tabs')) || [];
        };

        const saveTornTab = (index) => {
            const tornTabs = getTornTabs();
            if (!tornTabs.includes(index)) {
                tornTabs.push(index);
                localStorage.setItem('bcucommu_torn_tabs', JSON.stringify(tornTabs));
            }
        };

        const container = document.getElementById('tabsContainer');
        const modal = document.getElementById('modal');
        const modalText = document.getElementById('modalText');
        const closeBtn = document.getElementById('closeBtn');

        const tornTabs = getTornTabs();

        // สร้างกระดาษ 100 ใบ
        for (let i = 0; i < 100; i++) {
            const tab = document.createElement('div');
            tab.className = 'tear-tab';
            tab.dataset.index = i;
            
            // ถ้าเคยถูกดึงไปแล้ว ให้ซ่อนไว้ถาวร
            if (tornTabs.includes(i)) {
                tab.classList.add('hidden');
            }

            // ใส่ข้อความตกแต่งบนกระดาษแต่ละใบ
            const span = document.createElement('span');
            span.innerText = "ดึงฉันสิ";
            tab.appendChild(span);

            tab.addEventListener('click', function() {
                // อนิเมชั่นฉีกกระดาษ
                this.classList.add('tearing');
                
                // รอให้อนิเมชั่นฉีกเสร็จสิ้น (800ms) แล้วแสดงข้อความ
                setTimeout(() => {
                    this.classList.add('hidden');
                    saveTornTab(i); // บันทึกลงเครื่องผู้ใช้
                    
                    // แสดง Modal เหมือนการพลิกกระดาษอ่าน
                    modalText.innerText = allMessages[i];
                    modal.classList.add('active');
                }, 750);
            });

            container.appendChild(tab);
        }

        // ปิด Modal
        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // คลิกพื้นที่ว่างเพื่อปิด
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รางวัลสำหรับคนเก่ง bcucommu</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #2a2a2a;
            --paper-color: #fdfcf9;
            --text-main: #333333;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* โครงสร้างกระดาษหลัก */
        .poster-wrapper {
            width: 90%;
            max-width: 450px; /* ขนาดพอดีมือถือ */
            margin-top: 40px;
            margin-bottom: 100px;
            filter: drop-shadow(var(--shadow));
        }

        .main-paper {
            background: linear-gradient(135deg, #ffffff 0%, #f4f4f4 100%);
            padding: 40px 20px;
            text-align: center;
            position: relative;
            z-index: 2;
            border-radius: 2px 2px 0 0;
        }

        .main-paper::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: repeating-linear-gradient(to right, transparent, transparent 5px, #d1d1d1 5px, #d1d1d1 10px);
        }

        h1 {
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            letter-spacing: 0.5px;
            line-height: 1.4;
        }

        p.desc {
            color: #555;
            font-size: 0.9rem;
            font-weight: 300;
            line-height: 1.6;
        }

        /* ส่วนแถบกระดาษด้านล่าง 100 อัน */
        .tabs-container {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            scrollbar-width: none; /* ซ่อน scrollbar ใน Firefox */
            -ms-overflow-style: none; /* ซ่อน scrollbar ใน IE/Edge */
            position: relative;
            z-index: 1;
            padding-bottom: 20px;
        }
        
        .tabs-container::-webkit-scrollbar {
            display: none; /* ซ่อน scrollbar ใน Chrome/Safari */
        }

        .tab {
            flex: 0 0 35px;
            height: 120px;
            background: linear-gradient(180deg, #fdfcf9 0%, #ececec 100%);
            border-right: 1px solid rgba(0,0,0,0.05);
            border-left: 1px solid rgba(255,255,255,0.8);
            writing-mode: vertical-rl;
            text-align: center;
            padding-top: 10px;
            font-size: 0.75rem;
            color: #666;
            cursor: pointer;
            scroll-snap-align: start;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), background 0.3s;
            transform-origin: top;
            position: relative;
        }

        .tab:active {
            background: #e0e0e0;
        }

        /* รอยปรุด้านบนกระดาษแต่ละใบ */
        .tab::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 1px;
            background: repeating-linear-gradient(to right, transparent, transparent 2px, #999 2px, #999 4px);
        }

        /* แอนิเมชันตอนโดนฉีก */
        .tab.torn {
            animation: tearOff 0.6s cubic-bezier(0.55, 0.085, 0.68, 0.53) forwards;
            pointer-events: none;
        }

        @keyframes tearOff {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            50% { transform: translateY(40px) rotate(15deg); opacity: 0.8; }
            100% { transform: translateY(150px) rotate(35deg) scale(0.8); opacity: 0; }
        }

        /* Modal พลิกกระดาษอ่านข้อความ */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            perspective: 1000px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-paper {
            background: #fdfcf9;
            width: 85%;
            max-width: 400px;
            padding: 40px 30px;
            border-radius: 4px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transform: rotateX(90deg);
            transition: transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            background-image: linear-gradient(90deg, rgba(200,200,200,0.1) 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .modal-overlay.active .modal-paper {
            transform: rotateX(0deg);
        }

        .modal-message {
            font-size: 1rem;
            color: var(--text-main);
            line-height: 1.8;
            text-align: justify;
            font-weight: 300;
            white-space: pre-wrap;
        }

        .close-btn {
            margin-top: 30px;
            width: 100%;
            padding: 12px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-family: 'Prompt', sans-serif;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background: #555;
        }
        
        .grab-hint {
            display: flex;
            align-items: center;
            justify-content: center;
            color: #888;
            font-size: 0.8rem;
            margin-top: 15px;
            gap: 10px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="poster-wrapper">
        <div class="main-paper">
            <h1>รางวัลสำหรับคนเก่ง bcucommu</h1>
            <p class="desc">เพราะความตั้งใจของคุณมีค่าเสมอ ไม่ว่าวันนี้จะเจอเรื่องหนักหนาแค่ไหน ทั้งโค้ดที่รันไม่ผ่าน พล็อตที่คิดไม่ออก หรือตารางงานที่ยุ่งเหยิง... อนุญาตให้ตัวเองได้พักและรับกำลังใจจากกระดาษเหล่านี้ไปได้เลยนะ</p>
            <div class="grab-hint">
                <span>◀ เลื่อนซ้ายขวา และแตะเพื่อดึงกระดาษ ▶</span>
            </div>
        </div>
        <div class="tabs-container" id="tabs-container">
            </div>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-paper">
            <div class="modal-message" id="modal-text"></div>
            <button class="close-btn" id="close-btn">เก็บกำลังใจนี้ไว้ (ปิด)</button>
        </div>
    </div>

    <script>
        // ชุดข้อความให้กำลังใจขนาดยาว (ระบบจะสุ่มและวนซ้ำจนครบ 100 ใบ)
        const messages = [
            "บางครั้งการเติบโตก็ไม่ได้มาในรูปแบบของความสำเร็จที่ยิ่งใหญ่เสมอไป แต่มันแฝงอยู่ในความอดทนที่คุณมีในวันที่ทุกอย่างไม่เป็นใจ คุณอาจจะรู้สึกว่าก้าวเดินช้ากว่าคนอื่น แต่วันนี้คุณก็เดินมาไกลกว่าเมื่อวานแล้วนะ เก่งมากเลยที่ผ่านมันมาได้",
            "รู้นะว่าช่วงนี้เหนื่อยมาก ทั้งสิ่งที่แบกไว้บนบ่าและความคาดหวังต่างๆ อยากบอกว่าคุณทำได้ดีที่สุดแล้วล่ะ ไม่ต้องสมบูรณ์แบบไปเสียทุกอย่างหรอก แค่เป็นคุณที่พยายามในแบบของตัวเองก็ยอดเยี่ยมที่สุดแล้ว อนุญาตให้ตัวเองพักผ่อนบ้างนะ",
            "รอยยิ้มของคุณคือสิ่งที่มีค่ามากที่สุด อย่าลืมใจดีกับตัวเองให้มากๆ เหมือนที่คุณคอยใจดีกับคนรอบข้างเสมอ ความพยายามที่คุณทุ่มเทลงไปไม่เคยสูญเปล่า มันกำลังหล่อหลอมให้คุณกลายเป็นคนที่เข้มแข็งและงดงามขึ้นในทุกๆ วัน",
            "ไม่เป็นไรเลยถ้ารู้สึกว่าวันนี้เป็นวันที่แย่ ท้องฟ้ายังมีวันที่เมฆครึ้ม แล้วทำไมคนเราจะมีวันที่อ่อนแอไม่ได้ล่ะ ร้องไห้ได้นะ พักเหนื่อยได้นะ แล้วพรุ่งนี้ค่อยตื่นมารับแสงแดดใหม่ ขอให้โลกนี้ใจดีกับคุณเหมือนที่คุณตั้งใจใช้ชีวิตนะ",
            "การสร้างสรรค์ผลงานชิ้นหนึ่งขึ้นมาต้องใช้พลังงานเยอะมาก คุณคือศิลปินที่กำลังวาดลวดลายชีวิตของตัวเองอยู่ อาจจะมีลบจุดที่ผิดพลาดบ้าง ระบายสีออกนอกเส้นบ้าง แต่นั่นแหละคือศิลปะที่ทำให้ผลงานชิ้นนี้มีเอกลักษณ์และเป็นตัวคุณที่สุด ภูมิใจในตัวเองเยอะๆ นะ",
            "ขอบคุณนะที่ยังไม่ยอมแพ้ ขอบคุณที่ยังตื่นมาเผชิญหน้ากับโลกใบนี้ แม้ว่าบางวันมันจะดูวุ่นวายไปหมด คุณคือคนเก่งที่ซ่อนความเข้มแข็งไว้มากมาย ขอให้หลังจากนี้มีแต่เรื่องราวที่ทำให้คุณใจฟู และได้พบเจอกับความสุขที่เรียบง่ายในทุกวัน",
            "ความสำเร็จไม่ได้มีไว้ให้คนที่วิ่งเร็วที่สุดเพียงอย่างเดียว แต่มีไว้ให้คนที่ยังคงก้าวเดินต่อไปแม้จะสะดุดล้มต่างหาก ทุกความล้มเหลวคือบทเรียนที่ทำให้คุณแกร่งขึ้น อย่าลืมมองย้อนกลับไปดูนะว่าคุณฝ่าฟันอุปสรรคมาได้เยอะแค่ไหนแล้ว",
            "หากรู้สึกว่ากำลังแบกโลกไว้ทั้งใบ ลองค่อยๆ วางมันลงก่อนไหม โลกใบนี้หมุนไปได้โดยที่คุณไม่ต้องแบกมันไว้นะ หันมาดูแลหัวใจตัวเอง ทานของอร่อยๆ ฟังเพลงโปรด และนอนหลับให้เต็มอิ่ม เพราะร่างกายและจิตใจของคุณคือสิ่งที่สำคัญที่สุด",
            "อย่าเอาตัวเองไปเปรียบเทียบกับใครเลย ดอกไม้แต่ละดอกยังมีฤดูกาลผลิบานที่ไม่เหมือนกัน คุณเองก็มีจังหวะเวลา (Timezone) ของตัวเองที่สวยงามที่สุดเช่นกัน จงเบ่งบานในแบบของคุณ ในเวลาที่ใช่ของตัวคุณเองนะ",
            "จำไว้นะว่าคุณคือความภาคภูมิใจของตัวเอง ไม่ว่าผลลัพธ์ในวันนี้จะเป็นอย่างไร แต่ระหว่างทางคุณได้เรียนรู้ ได้เติบโต และได้พยายามอย่างเต็มที่แล้ว ขอส่งกอดอุ่นๆ ผ่านข้อความนี้ไปให้นะ คุณคนเก่ง"
        ];

        const tabsContainer = document.getElementById('tabs-container');
        const modal = document.getElementById('modal');
        const modalText = document.getElementById('modal-text');
        const closeBtn = document.getElementById('close-btn');

        // สร้างกระดาษ 100 อัน
        for (let i = 1; i <= 100; i++) {
            const tab = document.createElement('div');
            tab.className = 'tab';
            tab.textContent = 'ดึงกำลังใจ ' + i;
            
            // สุ่มข้อความให้แต่ละใบ
            const randomMessage = messages[Math.floor(Math.random() * messages.length)];

            tab.addEventListener('click', function() {
                if (!this.classList.contains('torn')) {
                    // ใส่แอนิเมชันฉีกกระดาษ
                    this.classList.add('torn');
                    
                    // หน่วงเวลาให้แอนิเมชันฉีกเล่นจบก่อนเปิด Modal พลิกกระดาษ
                    setTimeout(() => {
                        modalText.textContent = randomMessage;
                        modal.classList.add('active');
                    }, 500);
                }
            });

            tabsContainer.appendChild(tab);
        }

        // ปิด Modal
        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        // ปิด Modal เมื่อคลิกพื้นที่ว่าง
        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });
    </script>
</body>
</html>

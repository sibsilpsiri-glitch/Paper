<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รางวัลสำหรับคนเก่ง bcucommu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #262626;
            --paper-color: #fdfcf8;
            --text-dark: #333333;
            --shadow-color: rgba(0, 0, 0, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            /* ลายตารางพื้นหลังแบบมืออาชีพ */
            background-image: 
                linear-gradient(45deg, #2a2a2a 25%, transparent 25%, transparent 75%, #2a2a2a 75%, #2a2a2a),
                linear-gradient(45deg, #2a2a2a 25%, transparent 25%, transparent 75%, #2a2a2a 75%, #2a2a2a);
            background-size: 20px 20px;
            background-position: 0 0, 10px 10px;
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 90%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ส่วนหัวกระดาษ (Main Flyer) */
        .flyer-header {
            background-color: var(--paper-color);
            width: 100%;
            padding: 40px 20px;
            text-align: center;
            border-radius: 8px 8px 0 0;
            box-shadow: 0 10px 30px var(--shadow-color);
            position: relative;
            z-index: 10;
            /* เพิ่มพื้นผิวทรายบางๆ ให้กระดาษ */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        .flyer-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .flyer-header p {
            font-size: 14px;
            font-weight: 300;
            color: #555;
            line-height: 1.5;
        }

        /* ส่วนของรอยประและที่ใส่กระดาษ 100 แผ่น */
        .strips-wrapper {
            width: 100%;
            background-color: transparent;
            overflow-x: auto;
            /* ซ่อน Scrollbar แต่ยังเลื่อนได้ */
            scrollbar-width: none; 
            -ms-overflow-style: none;
            padding-bottom: 30px;
        }
        
        .strips-wrapper::-webkit-scrollbar {
            display: none;
        }

        .strips-container {
            display: flex;
            width: max-content;
            padding: 0 10px;
            gap: 2px;
        }

        /* กระดาษที่ฉีกได้แต่ละใบ */
        .strip {
            width: 35px;
            height: 120px;
            background-color: var(--paper-color);
            box-shadow: 2px 5px 10px rgba(0,0,0,0.2);
            border-top: 2px dashed #b3b3b3;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transform-origin: top center;
            transition: transform 0.3s ease, background-color 0.3s ease;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.05'/%3E%3C/svg%3E");
        }

        .strip:hover {
            background-color: #f0f0f0;
            transform: rotate(-2deg);
        }

        .strip-text {
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-size: 12px;
            font-weight: 600;
            color: #777;
            letter-spacing: 2px;
        }

        /* แอนิเมชันเวลาถูกดึง */
        .strip.tearing {
            animation: tearOff 0.8s forwards ease-in;
            pointer-events: none;
        }

        @keyframes tearOff {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            20% { transform: translateY(10px) rotate(-5deg); opacity: 1; }
            100% { transform: translateY(300px) rotate(15deg); opacity: 0; }
        }

        /* กระดาษที่ถูกดึงไปแล้ว (หายไปเลย) */
        .strip.torn {
            visibility: hidden;
            pointer-events: none;
        }

        /* หน้าต่างแสดงข้อความ (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(5px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .paper-message {
            width: 85%;
            max-width: 400px;
            background-color: var(--paper-color);
            padding: 40px 30px;
            border-radius: 4px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
            transform: translateY(50px) rotateX(-20deg);
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* รอยขาดด้านบนของกระดาษที่ถูกอ่าน */
            border-top: 3px dashed #ccc;
        }

        .modal-overlay.active .paper-message {
            transform: translateY(0) rotateX(0);
        }

        .paper-message p {
            font-size: 16px;
            font-weight: 300;
            color: var(--text-dark);
            line-height: 1.8;
            text-align: justify;
        }

        .close-btn {
            margin-top: 30px;
            width: 100%;
            padding: 12px;
            background-color: var(--text-dark);
            color: white;
            border: none;
            border-radius: 4px;
            font-family: 'Prompt', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .close-btn:hover {
            background-color: #555;
        }

        /* คำแนะนำให้เลื่อน */
        .scroll-hint {
            color: #999;
            font-size: 12px;
            margin-top: 15px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="flyer-header">
            <h1>รางวัลสำหรับคนเก่งssucommu</h1>
            <p>กระดาษใบนี้มีข้อความซ่อนอยู่<br>เลือกดึงไป 1 ใบ เพื่อรับรางวัลทางใจของคุณ</p>
        </div>
        
        <div class="strips-wrapper">
            <div class="strips-container" id="stripsContainer">
                </div>
        </div>
        <div class="scroll-hint">← เลื่อนซ้ายขวาเพื่อเลือกกระดาษ →</div>
    </div>

    <div class="modal-overlay" id="messageModal">
        <div class="paper-message">
            <p id="messageText">ข้อความจะปรากฏที่นี่...</p>
            <button class="close-btn" onclick="closeModal()">เก็บข้อความนี้ไว้ในใจ</button>
        </div>
    </div>

    <script>
        // --- ส่วนสร้างประโยค 100 แบบไม่ซ้ำกัน (ประกอบจาก 3 ส่วน) ---
        const intros = [
            "ในวันที่คุณรู้สึกเหน็ดเหนื่อยจากการทุ่มเทอย่างหนัก...",
            "หนทางที่คุณกำลังก้าวเดินอาจจะเต็มไปด้วยอุปสรรคมากมาย...",
            "บางครั้งความสำเร็จก็ชอบเล่นตลกให้เรารอนานกว่าที่คิด...",
            "แม้ว่าวันนี้อาจจะไม่ใช่วันที่สมบูรณ์แบบที่สุดสำหรับคุณ...",
            "เมื่อคุณมองย้อนกลับไปดูเส้นทางที่ผ่านมา...",
            "การต้องเผชิญกับความกดดันและความคาดหวังไม่ใช่เรื่องง่ายเลย...",
            "ขอให้คุณรับรู้ไว้ว่าความมุ่งมั่นของคุณไม่เคยสูญเปล่า...",
            "ในยามที่รู้สึกว่าพลังงานในตัวเริ่มลดน้อยลง...",
            "คุณอาจจะรู้สึกว่าตัวเองยังทำได้ไม่ดีพอในบางครั้ง...",
            "ช่วงเวลานี้อาจจะเป็นบททดสอบที่ท้าทายที่สุดในชีวิต..."
        ];

        const middles = [
            "แต่เชื่อไหมว่าทุกหยาดเหงื่อและทุกความพยายามที่คุณใส่ลงไป กำลังหล่อหลอมให้คุณกลายเป็นคนที่แข็งแกร่งและเก่งกาจขึ้นในทุกๆ วัน สิ่งที่คุณทำอยู่ตอนนี้มันยิ่งใหญ่และมีความหมายมากกว่าที่คุณคิดนะ",
            "ความอดทนและไม่ยอมแพ้ต่อโชคชะตาคือคุณสมบัติของคนที่ประสบความสำเร็จ ซึ่งคุณมีสิ่งนั้นอยู่อย่างเต็มเปี่ยม อย่าปล่อยให้ความลังเลชั่ววูบมาทำลายความตั้งใจอันแน่วแน่ของคุณ",
            "ทุกก้าวเล็กๆ ที่คุณเดินไปข้างหน้า แม้จะเชื่องช้าแต่ก็มั่นคงและเข้าใกล้เป้าหมายมากขึ้นเสมอ การเติบโตไม่ได้วัดกันที่ความเร็ว แต่วัดกันที่ความสม่ำเสมอและหัวใจที่ไม่ยอมหยุดเดิน",
            "ไม่มีใครเก่งมาตั้งแต่เกิด ทุกความเชี่ยวชาญล้วนผ่านการฝึกฝนและความผิดพลาดมานับครั้งไม่ถ้วน ให้โอกาสตัวเองได้เรียนรู้และเติบโตจากทุกประสบการณ์ที่เข้ามาในชีวิต",
            "คุณได้พิสูจน์ให้เห็นแล้วว่าคุณมีความสามารถแค่ไหน ผ่านเรื่องราวร้อยพันที่ถาโถมเข้ามาแต่คุณก็ยังยืนหยัดอยู่ได้ นั่นคือเครื่องยืนยันว่าจิตใจของคุณเข้มแข็งเพียงใด",
            "ความผิดพลาดเป็นเพียงป้ายบอกทาง ไม่ใช่จุดหมายปลายทาง มันช่วยสอนให้เรารู้ว่าวิธีไหนไม่ได้ผล เพื่อให้เราได้ค้นพบวิธีที่ใช่ในครั้งต่อไป จงโอบกอดทุกการเรียนรู้",
            "คุณอนุญาตให้ตัวเองอ่อนแอได้ ร้องไห้ได้ พักผ่อนได้ เพราะการพักไม่ได้หมายถึงการยอมแพ้ แต่คือการชาร์จพลังเพื่อกลับมาสู้ต่อด้วยหัวใจที่แข็งแรงกว่าเดิม",
            "รอบตัวคุณอาจจะมีเสียงวิจารณ์มากมาย แต่เสียงที่สำคัญที่สุดคือเสียงจากหัวใจของคุณเอง จงเชื่อมั่นในสัญชาตญาณและศักยภาพที่ซ่อนอยู่ในตัวคุณ",
            "ดอกไม้แต่ละชนิดมีเวลาเบ่งบานที่แตกต่างกัน ความสำเร็จของคุณก็เช่นกัน มันมีจังหวะเวลาที่เหมาะสมของมันเอง ขอแค่รดน้ำพรวนดินความฝันของคุณต่อไปอย่าได้หยุด",
            "ความพยายามของคุณสวยงามเสมอ ไม่ว่าผลลัพธ์จะออกมาเป็นอย่างไร การที่คุณกล้าที่จะลงมือทำและก้าวออกจากเซฟโซน ก็ถือว่าคุณชนะใจตัวเองไปแล้วก้าวหนึ่ง"
        ];

        const outros = [
            "จงยืดอกรับความภูมิใจนี้ไว้ เพราะคุณคือคนเก่งที่ควรค่าแก่การได้รับสิ่งที่ดีที่สุด เป็นกำลังใจให้เสมอ สู้ๆ นะ!",
            "จำไว้ว่าคุณไม่ได้อยู่ตัวคนเดียว ยังมีใครอีกหลายคนที่คอยมองดูและชื่นชมในการเติบโตของคุณ ก้าวต่อไปด้วยความมั่นใจนะ",
            "ขอส่งกอดอุ่นๆ และพลังบวกทั้งหมดนี้ให้คุณ ขอให้พรุ่งนี้เป็นวันที่ใจดีกับคุณ และขอให้คุณใจดีกับตัวเองให้มากๆ ด้วยล่ะ",
            "ยิ้มกว้างๆ ให้กับตัวเองในกระจกนะ คุณทำได้ดีมากๆ แล้ว และฉันเชื่อมั่นว่าคุณจะทำมันได้ดีขึ้นไปอีกอย่างแน่นอน",
            "พักผ่อนให้เพียงพอ ทานของอร่อยๆ ให้รางวัลตัวเองบ้าง แล้วค่อยกลับมาลุยต่อด้วยพลังที่เต็มเปี่ยม โลกนี้รอคอยความเปล่งประกายของคุณอยู่",
            "อย่าลืมขอบคุณตัวเองที่สู้มาจนถึงทุกวันนี้ คุณคือเวอร์ชั่นที่ดีที่สุดของตัวเองในตอนนี้แล้ว เดินหน้าต่อไปอย่างภาคภูมิใจนะ",
            "เส้นชัยอาจจะอยู่ไกลออกไปอีกนิด แต่ฉันมั่นใจว่าคนเก่งอย่างคุณจะวิ่งไปถึงมันได้อย่างสง่างามแน่นอน เป็นกำลังใจให้ในทุกก้าวเดิน",
            "ถ้าวันนี้เหนื่อยก็แค่หลับตาลง ปล่อยวางทุกอย่าง พรุ่งนี้เช้าพระอาทิตย์ขึ้นเมื่อไหร่ ค่อยเริ่มต้นใหม่ด้วยใจที่สดใสกว่าเดิมนะ",
            "คุณคือแรงบันดาลใจชั้นดีให้กับตัวคุณเองและคนรอบข้าง รักษาความยอดเยี่ยมนี้ไว้ และจงมีความสุขกับทุกๆ วันในชีวิต",
            "ขอให้ความตั้งใจทั้งหมดของคุณผลิดอกออกผลในเร็ววัน คุณคู่ควรกับความสำเร็จและความสุขทุกประการบนโลกใบนี้ สู้ต่อไปนะ คนเก่ง!"
        ];

        // สร้าง Array ข้อความ 100 ข้อความที่ไม่ซ้ำกัน
        const totalStrips = 100;
        const messages = [];
        for (let i = 0; i < totalStrips; i++) {
            let introText = intros[Math.floor(i / 10)];
            let middleText = middles[i % 10];
            let outroText = outros[(i + Math.floor(i / 10)) % 10];
            messages.push(`${introText} ${middleText} ${outroText}`);
        }

        // --- ระบบควบคุมหน้าเว็บ ---
        const container = document.getElementById('stripsContainer');
        const modal = document.getElementById('messageModal');
        const messageText = document.getElementById('messageText');
        
        // ดึงข้อมูลว่ากระดาษใบไหนดึงไปแล้วบ้าง จาก localStorage
        let tornStrips = JSON.parse(localStorage.getItem('bcucommu_torn_strips')) || [];

        // สร้างกระดาษ 100 ใบลงใน DOM
        for (let i = 0; i < totalStrips; i++) {
            const strip = document.createElement('div');
            strip.className = 'strip';
            
            // ถ้าดึงไปแล้ว ให้ใส่ class 'torn' เพื่อซ่อนอย่างถาวร
            if (tornStrips.includes(i)) {
                strip.classList.add('torn');
            }

            // ใส่ตัวอักษรลงในกระดาษ
            const text = document.createElement('span');
            text.className = 'strip-text';
            text.innerText = "ดึงฉันสิ";
            strip.appendChild(text);

            // เมื่อคลิกกระดาษ
            strip.onclick = function() {
                if(strip.classList.contains('tearing') || strip.classList.contains('torn')) return;
                
                // 1. เล่นแอนิเมชันขาด
                strip.classList.add('tearing');
                
                // 2. บันทึกในระบบว่าถูกดึงไปแล้ว (จะเอากลับมาไม่ได้)
                tornStrips.push(i);
                localStorage.setItem('bcucommu_torn_strips', JSON.stringify(tornStrips));

                // 3. รอให้แอนิเมชันดึงกระดาษจบ (0.8 วิ) แล้วแสดงข้อความ
                setTimeout(() => {
                    strip.classList.add('torn'); // ซ่อนถาวร
                    messageText.innerText = messages[i]; // ดึงข้อความของใบนั้นมาแสดง
                    modal.classList.add('active'); // เปิดหน้าต่างอ่าน
                }, 800);
            };

            container.appendChild(strip);
        }

        // ฟังก์ชันปิดหน้าต่างข้อความ
        function closeModal() {
            modal.classList.remove('active');
        }
    </script>
</body>
</html>

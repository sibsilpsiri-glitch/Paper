<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รางวัลสำหรับคนเก่ง bcucommu</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Prompt', sans-serif;
            background-color: #2a2a2a; /* พื้นหลังสีเทาเข้มตามโจทย์ */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 20px;
        }

        /* โครงสร้างกระดาษหลัก */
        .poster-container {
            width: 90%;
            max-width: 400px;
            background: #fdfdfd;
            background-image: linear-gradient(120deg, #fdfdfd 0%, #f4f4f4 100%);
            border-radius: 2px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 0 5px rgba(0,0,0,0.05);
            position: relative;
            padding: 30px 20px 10px 20px;
            display: flex;
            flex-direction: column;
            margin-bottom: 40px;
        }

        /* รอยฉีกด้านบนของกระดาษเพื่อความสมจริง */
        .poster-container::before {
            content: '';
            position: absolute;
            top: -5px;
            left: 0;
            right: 0;
            height: 10px;
            background: #2a2a2a;
            mask-image: url('data:image/svg+xml;utf8,<svg viewBox="0 0 100 10" xmlns="http://www.w3.org/2000/svg"><path d="M0 10 L5 0 L10 10 L15 2 L20 10 L25 1 L30 10 L35 3 L40 10 L45 0 L50 10 L55 2 L60 10 L65 1 L70 10 L75 3 L80 10 L85 0 L90 10 L95 2 L100 10 Z" fill="black"/></svg>');
            mask-size: 20px 10px;
            mask-repeat: repeat-x;
        }

        .header-text {
            text-align: center;
            margin-bottom: 20px;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 20px;
        }

        .header-text h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #222;
            line-height: 1.3;
            letter-spacing: 0.5px;
        }

        .header-text p {
            font-size: 0.85rem;
            color: #666;
            margin-top: 10px;
        }

        /* คอนเทนเนอร์สำหรับแถบกระดาษ 100 อัน (เลื่อนซ้ายขวาได้) */
        .tabs-wrapper {
            width: 100%;
            overflow-x: auto;
            padding: 10px 0 20px 0;
            scrollbar-width: none; /* Firefox */
        }
        .tabs-wrapper::-webkit-scrollbar {
            display: none; /* Chrome/Safari */
        }

        .tabs-container {
            display: flex;
            gap: 2px;
            width: max-content;
        }

        /* แถบกระดาษแต่ละชิ้น */
        .tear-tab {
            width: 35px;
            height: 120px;
            background: #fdfdfd;
            border: 1px dashed #bbb;
            border-top: 2px dashed #888;
            border-bottom: none;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            color: #444;
            cursor: pointer;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
            transition: background 0.3s;
            position: relative;
            transform-origin: top center;
        }

        .tear-tab:hover, .tear-tab:active {
            background: #eee;
        }

        /* แอนิเมชันตอนดึงกระดาษ */
        .tearing {
            animation: tearOff 0.6s forwards cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes tearOff {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            50% { transform: translateY(30px) rotate(-10deg); opacity: 0.8; }
            100% { transform: translateY(100px) rotate(-20deg); opacity: 0; display: none; }
        }

        /* Modal อ่านข้อความ */
        #read-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            perspective: 1000px; /* สำหรับ 3D flip */
        }

        #read-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* กระดาษที่ถูกพลิก */
        .flipped-paper {
            width: 85%;
            max-width: 350px;
            background: #fff;
            padding: 40px 30px;
            border-radius: 3px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            transform-style: preserve-3d;
            transform: rotateY(-180deg) scale(0.8);
            transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            background-image: radial-gradient(circle at center, #ffffff 0%, #f5f5f5 100%);
        }

        #read-modal.active .flipped-paper {
            transform: rotateY(0deg) scale(1);
        }

        .flipped-paper p {
            font-size: 1rem;
            color: #333;
            line-height: 1.8;
            text-align: center;
            backface-visibility: hidden;
        }

        .close-btn {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            background: transparent;
            color: #fff;
            border: 1px solid #fff;
            padding: 8px 20px;
            border-radius: 20px;
            font-family: 'Prompt', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.3s 0.6s; /* แสดงหลังจากพลิกเสร็จ */
        }

        #read-modal.active .close-btn {
            opacity: 1;
        }

        /* ซ่อนกระดาษที่ถูกดึงไปแล้วอย่างถาวร */
        .removed {
            display: none !important;
        }

    </style>
</head>
<body>

    <div class="poster-container">
        <div class="header-text">
            <h1>รางวัลสำหรับคนเก่ง ssucommu</h1>
            <p>เลือกดึงกระดาษ 1 ใบเพื่อรับกำลังใจ<br>(ดึงแล้วจะหายไปตลอดกาล)</p>
        </div>
        
        <div class="tabs-wrapper">
            <div class="tabs-container" id="tabs-container">
                </div>
        </div>
    </div>

    <div id="read-modal">
        <div class="flipped-paper">
            <p id="modal-text"></p>
            <button class="close-btn" onclick="closeModal()">เก็บไว้ในใจ</button>
        </div>
    </div>

    <script>
        // ชุดข้อความให้กำลังใจแบบยาว 100 ข้อความ
        const messages = [
            "การเริ่มต้นในแต่ละวันอาจเหนื่อยล้า แต่คุณเก่งมากที่ผ่านมันมาได้จนถึงตอนนี้ อุปสรรคคือบททดสอบที่ทำให้คุณแกร่งขึ้น อย่าลืมยิ้มให้ตัวเองในกระจกนะ",
            "บางครั้งการพักผ่อนก็คือความก้าวหน้าอย่างหนึ่ง ไม่ต้องรีบวิ่งตลอดเวลาก็ได้ ค่อยๆ เดินอย่างมั่นคง แล้วคุณจะถึงเส้นชัยในแบบที่งดงามที่สุด",
            "ความพยายามที่คุณทุ่มเทลงไปในทุกๆ โปรเจกต์ ไม่เคยสูญเปล่า มันกำลังหล่อหลอมให้คุณกลายเป็นเวอร์ชันที่ดีที่สุดของตัวเอง จงภูมิใจในความมุ่งมั่นนั้น",
            "ถึงวันนี้จะมีเรื่องให้ต้องปวดหัวหรือแก้ปัญหามากมาย แต่เชื่อเถอะว่าศักยภาพในตัวคุณมีมากกว่าที่คุณคิด หายใจลึกๆ แล้วค่อยๆ จัดการไปทีละเรื่องนะ",
            "โลกนี้อาจจะหมุนเร็วและเรียกร้องจากเรามากเกินไป แต่อย่าลืมให้รางวัลตัวเองด้วยการหยุดพักและชื่นชมสิ่งเล็กๆ รอบตัว คุณทำได้ดีมากๆ แล้ว",
            "การสร้างสรรค์ผลงานที่ยอดเยี่ยมต้องใช้เวลา เปรียบเหมือนการปลูกต้นไม้ที่ต้องรอคอยให้เติบโต อย่าเพิ่งท้อกับผลลัพธ์ในวันนี้ พรุ่งนี้มันจะผลิดอกออกผลแน่นอน",
            "รอยยิ้มของคุณคือพลังบวกที่สามารถส่งต่อให้คนรอบข้างได้ แม้ในวันที่ท้องฟ้าหม่นหมอง ขอให้รู้ไว้ว่าคุณคือแสงสว่างของใครบางคนเสมอ",
            "ไม่มีใครสมบูรณ์แบบและการทำผิดพลาดก็คือเสน่ห์อย่างหนึ่งของการเป็นมนุษย์ เรียนรู้จากมันแล้วก้าวต่อไป คุณเก่งขึ้นกว่าเมื่อวานตั้งเยอะแล้วนะ",
            "ทุกตัวอักษรที่คุณเขียน ทุกความพยายามที่คุณสร้าง มันสะท้อนให้เห็นถึงความตั้งใจจริง ขอให้รักษาความหลงใหลนี้ไว้ มันคือเสน่ห์ที่หาจากไหนไม่ได้",
            "รางวัลของความเหน็ดเหนื่อยอาจไม่ได้มาในรูปแบบของวัตถุเสมอไป แต่มันคือความรู้สึกภาคภูมิใจในตอนจบวัน ที่คุณสามารถพูดได้ว่า 'ฉันทำเต็มที่แล้ว'",
            "จงโอบกอดความรู้สึกของตัวเอง ไม่ว่าจะสุขหรือเศร้า ทุกความรู้สึกล้วนมีค่าและทำให้คุณเป็นคุณในวันนี้ เข้มแข็งไว้นะ คนเก่งของสิบศิลป์",
            "การรอคอยบางสิ่งอาจทำให้รู้สึกท้อแท้ แต่ผลลัพธ์ที่ได้มาด้วยความอดทน มักจะหอมหวานและคุ้มค่าเสมอ ขอให้เชื่อมั่นในจังหวะเวลาของชีวิตคุณ",
            "ไม่ต้องเปรียบเทียบตัวเองกับใครในโลกนี้ เพราะเส้นทางของแต่ละคนถูกวาดมาไม่เหมือนกัน คุณมีสไตล์และความสามารถที่เป็นเอกลักษณ์ของตัวเองเสมอ",
            "วันที่ฝนตกหนักที่สุด ก็ยังต้องมีวันที่มีรอยยิ้มของรุ้งกินน้ำ ปัญหาที่คุณเจอในวันนี้ จะกลายเป็นเพียงเรื่องเล่าในวันข้างหน้า สู้ๆ นะ",
            "คุณสมควรได้รับความรักและความใจดีจากตัวเองมากที่สุด อย่าใจร้ายกับตัวเองเวลาที่ทำอะไรไม่สำเร็จ พรุ่งนี้คือโอกาสใหม่ที่คุณสามารถเริ่มต้นใหม่ได้เสมอ",
            "เส้นทางที่คุณเลือกเดินอาจจะไม่ได้ปูด้วยกลีบกุหลาบ แต่มันจะเต็มไปด้วยประสบการณ์ล้ำค่าที่เงินก็หาซื้อไม่ได้ จงก้าวต่อไปด้วยความมั่นใจนะ",
            "ความคิดสร้างสรรค์ของคุณคือเวทมนตร์ที่ทำให้โลกนี้มีสีสัน อย่าหยุดฝันและอย่าหยุดสร้างสรรค์ เพราะมีคนรอชื่นชมผลงานของคุณอยู่อีกมากมาย",
            "ในวันที่รู้สึกว่าแบกโลกไว้ทั้งใบ ลองวางมันลงสักพัก ดื่มน้ำเย็นๆ ฟังเพลงโปรด แล้วค่อยกลับไปลุยใหม่ โลกใบนี้ไม่ได้ใจร้ายเกินไปหรอกนะ",
            "ความสม่ำเสมอคือเคล็ดลับของความสำเร็จ ทุกๆ ก้าวเล็กๆ ที่คุณเดินในทุกวัน จะรวมกันเป็นการเดินทางที่ยิ่งใหญ่ที่คุณจะต้องทึ่งในตัวเอง",
            "อยากบอกให้รู้ว่ามีคนมองเห็นความพยายามของคุณอยู่นะ แม้บางครั้งคุณอาจจะคิดว่าทำไปก็ไม่มีใครเห็น แต่จริงๆ แล้วคุณเปล่งประกายมากเลยล่ะ",
            "การสร้างพื้นที่ให้ผู้คนได้มามีความสุขร่วมกันไม่ใช่เรื่องง่ายเลยนะ ทุกรายละเอียดที่คุณใส่ใจ ทุกปัญหาที่คุณคอยแก้ มันทำให้ที่ที่คุณสร้างกลายเป็นบ้านที่อบอุ่นของใครหลายคน ขอบคุณที่เสียสละเวลามาสร้างสรรค์สิ่งดีๆ นะ ภูมิใจในตัวเองให้มากๆ",
            "ในช่วงเวลาที่คิดอะไรไม่ออกหรือรู้สึกว่าไอเดียมันตื้อไปหมด ลองวางมือหรือปิดหน้าจอลงก่อนนะ โลกแห่งจินตนาการของคุณยังรออยู่เสมอ ปล่อยให้ตัวเองได้พักผ่อน ดื่มด่ำกับโลกความจริงบ้าง แล้วแรงบันดาลใจจะกลับมาหาคุณเอง",
            "บางครั้งการแก้ปัญหาที่มองไม่เห็นหรือการจัดการระบบที่ซับซ้อนก็ทำให้ปวดหัวแทบแย่ แต่อย่าลืมว่าทุกครั้งที่คุณหาทางออกเจอ คุณเก่งขึ้นกว่าเมื่อวานเสมอ พักสายตาจากหน้าจอสักนิด หายใจลึกๆ แล้วค่อยกลับมาลุยต่อนะ",
            "การเป็นเสาหลักหรือเป็นคนที่คอยจัดการเรื่องต่างๆ มักจะมาพร้อมกับความกดดันที่มองไม่เห็น แต่คุณก็จัดการมันได้ดีเยี่ยมเสมอมา อย่าลืมแบ่งปันความหนักอึ้งนั้นให้คนอื่นช่วยแบกบ้างก็ได้นะ คนรอบข้างพร้อมสนับสนุนคุณเสมอ",
            "ความพยายามที่คุณซ่อนไว้เบื้องหลังความสำเร็จ อาจจะไม่มีใครเห็นมันทั้งหมด แต่ตัวคุณเองรู้ดีที่สุดว่าผ่านอะไรมาบ้าง กอดตัวเองแน่นๆ ชื่นชมความอดทนของตัวเอง แล้วบอกตัวเองดังๆ ว่า 'เรานี่ก็เก่งไม่เบาเลยนะเนี่ย'",

            "คุณอาจจะคิดว่าตัวเองเป็นแค่คนธรรมดาคนหนึ่ง แต่สำหรับบางคนแล้ว การมีอยู่ของคุณคือเหตุผลที่ทำให้เขาอยากตื่นมาเจอวันใหม่ คุณสำคัญกว่าที่คุณคิดไว้เยอะเลยนะ",
            "ต่อให้วันนี้จะไม่มีใครปรบมือให้คุณ แต่อยากให้รู้ไว้ว่าโลกใบนี้แอบขอบคุณคุณอยู่เงียบๆ ที่คุณอดทนและมีชีวิตรอดมาได้จนถึงตอนนี้ คุณเก่งที่สุดแล้วและสำคัญที่สุดเลย",
            "แค่นั่งหายใจเฉยๆ ในวันนี้ คุณก็ทำหน้าที่สิ่งมีชีวิตที่น่ารักได้สมบูรณ์แบบแล้วล่ะ ไม่ต้องกดดันตัวเองนะ อยู่เป็นความสดใสให้กับโลกใบนี้ไปนานๆ เถอะ"
            // ชุดข้อความที่เหลือเพื่อให้ครบ 100 (ใช้การสุ่มประโยคประกอบกันเพื่อให้ได้ข้อความยาวและมีความหมายลึกซึ้ง)
            ...Array.from({length: 80}).map((_, i) => {
                const parts1 = [
                    "คุณคือส่วนสำคัญที่ทำให้คอมมูนิตี้เราน่าอยู่ ",
                    "ความทุ่มเทในทุกวันของคุณคือสิ่งมหัศจรรย์ ",
                    "แม้ว่าบางครั้งจะรู้สึกว่าทุกอย่างถาโถมเข้ามา ",
                    "การจัดการกับหลายๆ เรื่องพร้อมกันไม่ใช่เรื่องง่าย ",
                    "อย่าลืมว่าคุณมีสิทธิ์ที่จะเหนื่อยและมีสิทธิ์ที่จะพัก "
                ];
                const parts2 = [
                    "ความอดทนที่คุณมีจะเป็นรากฐานของความสำเร็จที่ยั่งยืน ",
                    "ผลงานที่คุณรังสรรค์ออกมามีคุณค่าในตัวมันเองเสมอ ",
                    "อยากให้รู้ไว้ว่าความพยายามของคุณเป็นที่ประจักษ์ชัดเจน ",
                    "การเรียนรู้และการปรับปรุงตัวเองคือเส้นทางสู่ความเป็นเลิศ ",
                    "ขอให้ภูมิใจในความก้าวหน้า แม้จะเป็นเพียงก้าวเล็กๆ ก็ตาม "
                ];
                const parts3 = [
                    "ขอให้วันนี้เป็นวันที่ดีและมีแต่รอยยิ้มนะ",
                    "เป็นกำลังใจให้เสมอในทุกๆ เส้นทางที่คุณเลือกเดิน",
                    "กอดๆ นะ คนเก่ง ขอให้ความเหนื่อยล้าจางหายไป",
                    "คุณทำได้ดีมากๆ แล้ว จงเชื่อมั่นในตัวเองต่อไป",
                    "bcucommu จะคอยสนับสนุนและเป็นพื้นที่ปลอดภัยให้คุณเสมอ"
                ];
                return parts1[i % 5] + parts2[(i + 2) % 5] + parts3[(i + 4) % 5] + " รักษาความเก่งนี้ไว้นะ!";
            })
        ];

        const tabsContainer = document.getElementById('tabs-container');
        const modal = document.getElementById('read-modal');
        const modalText = document.getElementById('modal-text');
        
        // ตัวแปรเก็บ index ของกระดาษที่ถูกดึงไปแล้ว
        let currentTornIndex = null;
        let tornTabs = [];

        // โหลดข้อมูลจาก LocalStorage
        function loadTornTabs() {
            const saved = localStorage.getItem('bcucommu_torn_tabs');
            if (saved) {
                tornTabs = JSON.parse(saved);
            }
        }

        // บันทึกข้อมูลลง LocalStorage
        function saveTornTab(index) {
            if (!tornTabs.includes(index)) {
                tornTabs.push(index);
                localStorage.setItem('bcucommu_torn_tabs', JSON.stringify(tornTabs));
            }
        }

        // สร้างกระดาษ 100 ใบ
        function renderTabs() {
            loadTornTabs();
            tabsContainer.innerHTML = '';
            
            for (let i = 0; i < 100; i++) {
                const tab = document.createElement('div');
                tab.className = 'tear-tab';
                tab.id = `tab-${i}`;
                tab.innerHTML = `ดึงใบที่ ${i + 1}`;
                
                // ถ้าดึงไปแล้ว ให้ซ่อนถาวร
                if (tornTabs.includes(i)) {
                    tab.classList.add('removed');
                } else {
                    tab.onclick = () => pullTab(i, tab);
                }
                
                tabsContainer.appendChild(tab);
            }
        }

        // ฟังก์ชันเมื่อคลิกดึงกระดาษ
        function pullTab(index, element) {
            // ป้องกันการคลิกซ้ำ
            element.onclick = null;
            element.classList.add('tearing');
            currentTornIndex = index;

            // หน่วงเวลาให้แอนิเมชันฉีกขาดเสร็จสิ้นก่อนโชว์ Modal
            setTimeout(() => {
                showModal(index);
            }, 600);
        }

        // แสดง Modal พร้อมแอนิเมชันพลิก
        function showModal(index) {
            modalText.innerText = messages[index] || messages[0];
            modal.classList.add('active');
        }

        // ปิด Modal และซ่อนกระดาษนั้นถาวร
        function closeModal() {
            modal.classList.remove('active');
            
            if (currentTornIndex !== null) {
                // บันทึกลง Storage
                saveTornTab(currentTornIndex);
                // ลบออกจาก DOM เพื่อความสมจริง
                const tornElement = document.getElementById(`tab-${currentTornIndex}`);
                if (tornElement) {
                    tornElement.classList.add('removed');
                }
                currentTornIndex = null;
            }
        }

        // เริ่มต้นการทำงาน
        window.onload = renderTabs;

    </script>
</body>
</html>
